<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PloiKhong — Redesign Concepts</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Inter+Tight:wght@500;600;700;800&display=swap"/>
<style>
/* ========== TWEAK ROOT ========== */
:root{
  --accent:#0B5FFF;
  --accent-ink:#fff;
  --radius:10px;
  --radius-sm:6px;
  --density:1;
  --font-th:'IBM Plex Sans Thai','IBM Plex Sans',system-ui,sans-serif;
  --font-display:'Inter Tight','IBM Plex Sans',system-ui,sans-serif;
  --font-mono:'IBM Plex Mono',ui-monospace,monospace;

  /* light */
  --bg:#f8fafc;
  --surface:#ffffff;
  --surface-2:#f1f5f9;
  --line:#e2e8f0;
  --line-2:#cbd5e1;
  --ink:#0f172a;
  --ink-2:#475569;
  --ink-3:#94a3b8;
  --pos:#16a34a;
  --warn:#d97706;
  --neg:#dc2626;
}
html[data-theme="dark"]{
  --bg:#0f172a;
  --surface:#1e293b;
  --surface-2:#334155;
  --line:#334155;
  --line-2:#475569;
  --ink:#f1f5f9;
  --ink-2:#94a3b8;
  --ink-3:#64748b;
  --pos:#4ade80;
  --warn:#fbbf24;
  --neg:#f87171;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:var(--font-th);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}

/* ====== TOP BAR (variation switcher) ====== */
.top-switch{position:sticky;top:0;z-index:90;background:var(--surface);border-bottom:1px solid var(--line);padding:10px 16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.top-switch .brand{font-family:var(--font-display);font-weight:800;font-size:15px;letter-spacing:-.01em;margin-right:8px}
.top-switch .brand span{color:var(--accent)}
.pill-group{display:flex;gap:4px;background:var(--surface-2);padding:3px;border-radius:999px}
.pill-group button{padding:6px 14px;border-radius:999px;font-size:13px;color:var(--ink-2);font-weight:500}
.pill-group button.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06)}
.top-switch .sep{flex:1}
.mini-btn{font-size:12px;padding:6px 10px;border:1px solid var(--line);border-radius:var(--radius-sm);color:var(--ink-2)}
.mini-btn:hover{border-color:var(--line-2);color:var(--ink)}

.stage{min-height:calc(100vh - 49px)}
.variant{display:none}
.variant.on{display:block}

/* =========== Shared primitives =========== */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;border:1px solid var(--line);color:var(--ink);background:var(--surface);transition:.15s}
.btn:hover{border-color:var(--line-2);background:var(--surface-2)}
.btn-primary{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.btn-primary:hover{filter:brightness(.94);background:var(--accent)}
.btn-ghost{border-color:transparent}
.btn-ghost:hover{background:var(--surface-2)}
.btn-sm{padding:6px 11px;font-size:13px}
.btn-lg{padding:12px 22px;font-size:15px}

.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:3px 8px;border-radius:999px;border:1px solid var(--line);color:var(--ink-2);background:var(--surface);letter-spacing:.01em}
.tag.solid{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.tag.accent{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.tag.pos{color:var(--pos);border-color:color-mix(in srgb,var(--pos) 30%,transparent)}
.tag.warn{color:var(--warn);border-color:color-mix(in srgb,var(--warn) 30%,transparent)}
.tag.boost{background:linear-gradient(90deg,#111,#333);color:#fff;border-color:transparent}

.mono{font-family:var(--font-mono);font-feature-settings:"tnum" 1,"lnum" 1}

/* placeholder imagery (no emoji) */
.ph{position:relative;overflow:hidden;background:var(--surface-2);color:var(--ink-3)}
.ph::before{content:"";position:absolute;inset:0;background-image:repeating-linear-gradient(135deg,transparent 0 10px,color-mix(in srgb,var(--ink-3) 8%,transparent) 10px 11px)}
.ph .ph-lbl{position:absolute;left:10px;bottom:8px;font-family:var(--font-mono);font-size:10px;color:var(--ink-3);letter-spacing:.05em;text-transform:uppercase;background:color-mix(in srgb,var(--surface) 80%,transparent);padding:2px 6px;border-radius:3px;backdrop-filter:blur(4px)}

/* =========== MONEYMAKER banner (shared component) =========== */
.money-rail{background:var(--surface);border:1px solid var(--line);border-radius:calc(var(--radius) + 4px);padding:calc(18px * var(--density));display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.money-card{border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;background:var(--surface-2);display:flex;flex-direction:column;gap:4px;position:relative;overflow:hidden}
.money-card .mkh{font-family:var(--font-display);font-weight:700;font-size:15px;letter-spacing:-.01em}
.money-card .mkd{font-size:12px;color:var(--ink-2);line-height:1.5}
.money-card .mkbadge{position:absolute;top:10px;right:10px;font-size:10px;font-weight:700;font-family:var(--font-mono);letter-spacing:.08em;color:var(--accent);text-transform:uppercase}
.money-card.featured{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.money-card.featured .mkd{color:color-mix(in srgb,var(--bg) 72%,transparent)}
.money-card.featured .mkbadge{color:var(--bg);opacity:.6}

@media(max-width:900px){
  .money-rail{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:520px){
  .money-rail{grid-template-columns:1fr}
}

/* =========== V1: Editorial Grid =========== */
.v1{max-width:1320px;margin:0 auto;padding:0 calc(22px * var(--density))}
.v1-nav{display:flex;align-items:center;gap:20px;padding:22px 0 18px;border-bottom:1px solid var(--line)}
.v1-logo{font-family:var(--font-display);font-weight:800;font-size:22px;letter-spacing:-.02em}
.v1-logo span{color:var(--accent)}
.v1-search{flex:1;max-width:520px;position:relative}
.v1-search input{width:100%;padding:11px 14px 11px 38px;border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--line);font-family:inherit;font-size:14px;color:var(--ink)}
.v1-search input:focus{outline:none;border-color:var(--ink-2)}
.v1-search .sic{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--ink-3)}
.v1-nav-r{display:flex;gap:8px;align-items:center;margin-left:auto}

.v1-hero{padding:calc(56px * var(--density)) 0 calc(40px * var(--density));border-bottom:1px solid var(--line);display:grid;grid-template-columns:1.2fr .8fr;gap:40px;align-items:end}
.v1-hero h1{font-family:var(--font-display);font-size:clamp(38px,5.6vw,72px);line-height:1.02;letter-spacing:-.035em;font-weight:700}
.v1-hero h1 em{font-style:normal;color:var(--accent)}
.v1-hero .sub{color:var(--ink-2);font-size:16px;max-width:460px;margin-top:18px;line-height:1.6}
.v1-hero .cta{display:flex;gap:10px;margin-top:26px;flex-wrap:wrap}
.v1-hero-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.v1-stat{border:1px solid var(--line);border-radius:var(--radius);padding:18px;background:var(--surface)}
.v1-stat .n{font-family:var(--font-display);font-size:34px;font-weight:700;letter-spacing:-.02em}
.v1-stat .l{font-size:12px;color:var(--ink-2);margin-top:2px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em}

.v1-section-head{display:flex;align-items:baseline;justify-content:space-between;padding:calc(40px * var(--density)) 0 14px}
.v1-section-head h2{font-family:var(--font-display);font-size:26px;letter-spacing:-.02em;font-weight:700}
.v1-section-head .link{font-size:13px;color:var(--ink-2);border-bottom:1px solid var(--line-2);padding-bottom:2px}
.v1-section-head .link:hover{color:var(--ink);border-color:var(--ink)}

.v1-cat-strip{display:flex;gap:8px;padding:8px 0 4px;overflow-x:auto;scrollbar-width:none}
.v1-cat-strip::-webkit-scrollbar{display:none}
.v1-cat{padding:8px 14px;border:1px solid var(--line);border-radius:999px;font-size:13px;color:var(--ink-2);white-space:nowrap;background:var(--surface)}
.v1-cat.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}

.v1-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:calc(18px * var(--density));padding:14px 0 60px}
@media(max-width:1100px){.v1-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:760px){
  .v1-grid{grid-template-columns:repeat(2,1fr);gap:12px}
  .v1-hero{grid-template-columns:1fr;padding:36px 0 28px}
  .v1-hero-stats{grid-template-columns:repeat(4,1fr)}
  .v1-nav{padding:14px 0 12px;flex-wrap:wrap}
  .v1-search{order:3;flex:1 1 100%;max-width:none}
}

.pcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;transition:.18s;cursor:pointer;position:relative}
.pcard:hover{border-color:var(--ink);transform:translateY(-1px)}
.pcard .thumb{aspect-ratio:1/1;width:100%}
.pcard .body{padding:12px 14px 14px}
.pcard .title{font-size:14px;font-weight:500;line-height:1.4;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.8em}
.pcard .price{font-family:var(--font-display);font-size:18px;font-weight:700;letter-spacing:-.01em}
.pcard .price s{color:var(--ink-3);font-weight:400;font-size:13px;margin-left:6px}
.pcard .foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px;font-size:12px;color:var(--ink-3)}
.pcard .wl{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:50%;background:color-mix(in srgb,var(--surface) 82%,transparent);border:1px solid var(--line);display:grid;place-items:center;backdrop-filter:blur(6px)}
.pcard .wl svg{width:14px;height:14px;stroke:var(--ink);fill:none;stroke-width:1.8}
.pcard .wl.on svg{fill:var(--neg);stroke:var(--neg)}
.pcard .flag{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;gap:4px}

/* =========== V2: Marketplace Dense =========== */
.v2-header{position:sticky;top:49px;z-index:40;background:var(--surface);border-bottom:1px solid var(--line)}
.v2-header-in{max-width:1440px;margin:0 auto;padding:12px 20px;display:flex;gap:14px;align-items:center}
.v2-logo{font-family:var(--font-display);font-weight:800;font-size:20px;letter-spacing:-.02em;color:var(--ink);display:flex;align-items:center;gap:8px}
.v2-logo .mark{width:28px;height:28px;border-radius:8px;background:var(--accent);color:#fff;display:grid;place-items:center;font-size:14px;font-weight:700}
.v2-search{flex:1;max-width:640px;display:flex;border:1px solid var(--line);border-radius:var(--radius-sm);overflow:hidden;background:var(--surface)}
.v2-search input{flex:1;padding:10px 14px;border:none;outline:none;background:transparent;font-family:inherit;font-size:14px;color:var(--ink)}
.v2-search .cat-split{border-left:1px solid var(--line);padding:0 14px;display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-2)}
.v2-search button{padding:0 18px;background:var(--ink);color:var(--bg);font-size:13px;font-weight:500}
.v2-header-r{display:flex;gap:4px;align-items:center;margin-left:auto}
.v2-icon-btn{padding:8px 12px;border-radius:var(--radius-sm);color:var(--ink-2);font-size:13px;display:flex;gap:6px;align-items:center;position:relative}
.v2-icon-btn:hover{background:var(--surface-2);color:var(--ink)}
.v2-icon-btn .dot{position:absolute;top:6px;right:8px;width:6px;height:6px;background:var(--accent);border-radius:50%}
.v2-sell{background:var(--accent);color:var(--accent-ink);padding:9px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;white-space:nowrap;flex-shrink:0}
.v2-sell:hover{filter:brightness(.94)}

/* Account dropdown */
.v2-acct{position:relative;margin-left:6px}
.v2-acct-backdrop{position:fixed;inset:0;z-index:999}
.v2-acct-menu{position:fixed !important;top:60px !important;right:20px !important;z-index:1000 !important}
.v2-acct-trigger{display:flex;align-items:center;gap:4px;padding:4px 6px 4px 4px;border-radius:999px;background:var(--surface-2)}
.v2-acct-trigger:hover{background:var(--line)}
.v2-acct-ava{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 60%,#000));color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;letter-spacing:.02em}
.v2-acct-ava.lg{width:42px;height:42px;font-size:14px}
.v2-acct-menu{position:absolute;top:calc(100% + 6px);right:0;width:268px;background:var(--surface);border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.15);z-index:100;padding:6px;animation:acctPop .14s cubic-bezier(.2,.8,.2,1)}
@keyframes acctPop{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.v2-acct-head{display:flex;gap:10px;align-items:center;padding:10px 8px 10px}
.v2-acct-meta{min-width:0}
.v2-acct-name{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.v2-acct-sub{font-size:11px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.v2-acct-sep{height:1px;background:var(--line);margin:4px 0}
.v2-acct-item{width:100%;display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:6px;font-size:13px;color:var(--ink);text-align:left}
.v2-acct-item:hover{background:var(--surface-2)}
.v2-acct-item svg{color:var(--ink-2);flex-shrink:0}
.v2-acct-item.danger{color:var(--neg)}
.v2-acct-item.danger svg{color:var(--neg)}
.v2-acct-badge{margin-left:auto;background:color-mix(in srgb,var(--warn) 18%,transparent);color:var(--warn);padding:2px 7px;border-radius:999px;font-size:11px;font-weight:600}
.v2-acct-toggle{margin-left:auto;width:28px;height:16px;background:var(--line);border-radius:999px;position:relative;transition:background .15s}
.v2-acct-toggle::after{content:"";position:absolute;top:2px;left:2px;width:12px;height:12px;background:#fff;border-radius:50%;transition:left .15s}
html[data-theme="dark"] .v2-acct-toggle{background:var(--accent)}
html[data-theme="dark"] .v2-acct-toggle::after{left:14px}

.v2-subnav{border-top:1px solid var(--line);background:var(--surface)}
.v2-subnav-in{max-width:1440px;margin:0 auto;padding:0 20px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.v2-subnav-in::-webkit-scrollbar{display:none}
.v2-subnav a{padding:11px 16px;font-size:13px;color:var(--ink-2);border-bottom:2px solid transparent;white-space:nowrap}
.v2-subnav a.on{color:var(--ink);border-bottom-color:var(--ink)}
.v2-subnav a:hover{color:var(--ink)}

.v2-wrap{max-width:1440px;margin:0 auto;padding:calc(20px * var(--density)) 20px 60px;display:grid;grid-template-columns:240px 1fr;gap:calc(24px * var(--density))}
.v2-side{position:sticky;top:170px;align-self:start;max-height:calc(100vh - 190px);overflow-y:auto;padding-right:6px}
.v2-side h4{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);margin:18px 0 8px;font-weight:500}
.v2-side h4:first-child{margin-top:0}
.v2-side ul{list-style:none;display:flex;flex-direction:column;gap:2px}
.v2-side li a{display:flex;justify-content:space-between;padding:6px 8px;border-radius:var(--radius-sm);font-size:13px;color:var(--ink-2)}
.v2-side li a:hover{background:var(--surface-2);color:var(--ink)}
.v2-side li a.on{background:var(--surface-2);color:var(--ink);font-weight:500}
.v2-side li a .n{color:var(--ink-3);font-family:var(--font-mono);font-size:12px}
.v2-side .range{display:flex;gap:6px}
.v2-side .range input{flex:1;padding:7px 9px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--surface);font-size:12px;color:var(--ink);font-family:var(--font-mono)}
.v2-side label.chk{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-2);padding:5px 8px;cursor:pointer;border-radius:var(--radius-sm)}
.v2-side label.chk:hover{background:var(--surface-2)}
.v2-side label.chk input{accent-color:var(--accent)}

.v2-main .v2-tools{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--line)}
.v2-main .v2-tools .result-n{font-size:13px;color:var(--ink-2)}
.v2-main .v2-tools .result-n b{color:var(--ink);font-weight:600}
.v2-main .v2-tools .right{display:flex;gap:8px;align-items:center}
.v2-main .v2-tools select{padding:6px 10px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--surface);color:var(--ink);font-family:inherit;font-size:13px}
.layout-toggle{display:flex;border:1px solid var(--line);border-radius:var(--radius-sm);overflow:hidden}
.layout-toggle button{padding:6px 10px;color:var(--ink-3)}
.layout-toggle button.on{background:var(--surface-2);color:var(--ink)}

.v2-banner{background:linear-gradient(120deg,var(--surface),var(--surface-2));border:1px solid var(--line);border-radius:var(--radius);padding:18px 22px;margin-bottom:18px;display:flex;align-items:center;gap:16px}
.v2-banner .vb-mark{width:40px;height:40px;border-radius:var(--radius-sm);background:var(--accent);color:#fff;display:grid;place-items:center;font-weight:700;flex-shrink:0;font-family:var(--font-display)}
.v2-banner .vb-body{flex:1}
.v2-banner h3{font-family:var(--font-display);font-size:16px;letter-spacing:-.01em;margin-bottom:2px}
.v2-banner p{font-size:13px;color:var(--ink-2)}

.v2-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:1200px){.v2-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:1000px){.v2-wrap{grid-template-columns:1fr}.v2-side{position:static;display:none}.v2-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:700px){.v2-grid{grid-template-columns:repeat(2,1fr);gap:10px}.v2-header-in{flex-wrap:wrap}.v2-search{order:3;flex-basis:100%}}

/* =========== V3: Social Feed =========== */
.v3{background:var(--bg)}
.v3-nav{position:sticky;top:49px;z-index:40;background:color-mix(in srgb,var(--surface) 94%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.v3-nav-in{max-width:1200px;margin:0 auto;padding:14px 20px;display:flex;gap:14px;align-items:center}
.v3-logo{font-family:var(--font-display);font-weight:800;font-size:20px;letter-spacing:-.02em}
.v3-search{flex:1;max-width:420px;position:relative}
.v3-search input{width:100%;padding:10px 14px 10px 36px;border-radius:999px;background:var(--surface-2);border:1px solid transparent;font-size:14px;color:var(--ink);font-family:inherit}
.v3-search input:focus{outline:none;border-color:var(--line-2);background:var(--surface)}
.v3-search .sic{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--ink-3)}
.v3-nav-r{display:flex;gap:4px;align-items:center;margin-left:auto}
.v3-ib{width:38px;height:38px;border-radius:999px;display:grid;place-items:center;color:var(--ink-2);position:relative}
.v3-ib:hover{background:var(--surface-2);color:var(--ink)}
.v3-ib .dot{position:absolute;top:8px;right:9px;width:7px;height:7px;background:var(--accent);border-radius:50%}
.v3-ava{width:34px;height:34px;border-radius:999px;background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 60%,#000));color:#fff;display:grid;place-items:center;font-weight:600;font-size:12px;margin-left:4px}

.v3-wrap{max-width:1200px;margin:0 auto;padding:calc(22px * var(--density)) 20px 80px;display:grid;grid-template-columns:220px 1fr 300px;gap:22px}
@media(max-width:1100px){.v3-wrap{grid-template-columns:1fr 320px}.v3-left{display:none}}
@media(max-width:820px){.v3-wrap{grid-template-columns:1fr;padding:14px 14px 90px}.v3-right{display:none}}

.v3-left{position:sticky;top:130px;align-self:start}
.v3-left ul{list-style:none}
.v3-left li a{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-sm);font-size:14px;color:var(--ink-2);font-weight:500}
.v3-left li a:hover{background:var(--surface-2);color:var(--ink)}
.v3-left li a.on{background:var(--ink);color:var(--bg)}
.v3-left li a .ic{width:18px;height:18px;flex-shrink:0}
.v3-left .count{margin-left:auto;font-size:11px;font-family:var(--font-mono);color:var(--ink-3)}
.v3-left li a.on .count{color:color-mix(in srgb,var(--bg) 70%,transparent)}

.v3-feed{display:flex;flex-direction:column;gap:calc(18px * var(--density))}
.composer{background:var(--surface);border:1px solid var(--line);border-radius:calc(var(--radius) + 4px);padding:18px}
.composer .crow{display:flex;gap:12px}
.composer .cav{width:40px;height:40px;border-radius:999px;background:var(--surface-2);flex-shrink:0;display:grid;place-items:center;font-weight:600;color:var(--ink-2);font-size:13px}
.composer .cmain{flex:1}
.composer .cmain .prompt{background:var(--surface-2);border-radius:999px;padding:11px 18px;font-size:14px;color:var(--ink-3);cursor:text}
.composer .crowf{display:flex;gap:6px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
.composer .crowf button{padding:7px 12px;border-radius:var(--radius-sm);font-size:12px;color:var(--ink-2);display:flex;gap:6px;align-items:center}
.composer .crowf button:hover{background:var(--surface-2);color:var(--ink)}
.composer .crowf .sellbtn{margin-left:auto;background:var(--accent);color:var(--accent-ink);font-weight:600;padding:7px 16px}
.composer .crowf .sellbtn:hover{background:var(--accent);filter:brightness(.94)}

.post{background:var(--surface);border:1px solid var(--line);border-radius:calc(var(--radius) + 4px);overflow:hidden}
.post-head{display:flex;align-items:center;gap:10px;padding:14px 18px 12px}
.post-head .av{width:36px;height:36px;border-radius:999px;background:var(--surface-2);display:grid;place-items:center;font-weight:600;color:var(--ink-2);font-size:12px}
.post-head .nm{font-weight:600;font-size:14px}
.post-head .meta{font-size:12px;color:var(--ink-3);font-family:var(--font-mono)}
.post-head .more{margin-left:auto;color:var(--ink-3);padding:6px;border-radius:var(--radius-sm)}
.post-head .more:hover{background:var(--surface-2);color:var(--ink)}
.post-body{padding:0 18px 14px}
.post-body .pt{font-family:var(--font-display);font-size:19px;font-weight:700;letter-spacing:-.01em;line-height:1.3;margin-bottom:6px}
.post-body .pp{font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
.post-body .pp s{color:var(--ink-3);font-size:16px;font-weight:400;margin-left:8px}
.post-body .pm{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.post-media{aspect-ratio:4/3;width:100%}
.post-media.tall{aspect-ratio:3/4;max-height:620px}
.post-foot{display:flex;align-items:center;padding:8px 10px;border-top:1px solid var(--line)}
.post-foot button{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:9px;border-radius:var(--radius-sm);font-size:13px;color:var(--ink-2);font-weight:500}
.post-foot button:hover{background:var(--surface-2);color:var(--ink)}
.post-foot button svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8}
.post-foot button.primary{color:var(--accent-ink);background:var(--accent)}
.post-foot button.primary:hover{background:var(--accent);filter:brightness(.94)}

.v3-right{position:sticky;top:130px;align-self:start;display:flex;flex-direction:column;gap:16px}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
.panel h4{font-family:var(--font-display);font-size:15px;letter-spacing:-.005em;margin-bottom:10px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.panel h4 .tinybtn{font-size:11px;color:var(--ink-3);font-weight:400;font-family:var(--font-th)}

.trend-item{display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px dashed var(--line)}
.trend-item:last-child{border:none;padding-bottom:0}
.trend-item .trend-img{width:44px;height:44px;border-radius:var(--radius-sm);flex-shrink:0}
.trend-item .trend-t{flex:1;min-width:0}
.trend-item .trend-nm{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trend-item .trend-meta{font-size:11px;color:var(--ink-3);font-family:var(--font-mono);margin-top:2px}
.trend-item .trend-pr{font-family:var(--font-display);font-weight:700;font-size:14px}

.seller-pro{display:flex;gap:12px;align-items:center;padding:10px 0;border-bottom:1px dashed var(--line)}
.seller-pro:last-child{border:none;padding-bottom:0}
.seller-pro .sp-av{width:38px;height:38px;border-radius:999px;background:var(--surface-2);flex-shrink:0;display:grid;place-items:center;font-weight:600;color:var(--ink-2);font-size:12px}
.seller-pro .sp-nm{font-size:13px;font-weight:500}
.seller-pro .sp-s{font-size:11px;color:var(--ink-3);font-family:var(--font-mono)}
.seller-pro .sp-b{font-size:11px;padding:3px 10px;border:1px solid var(--line);border-radius:999px;color:var(--ink)}
.seller-pro .sp-b.following{background:var(--surface-2);color:var(--ink-3)}

/* Bottom nav (all variants on mobile) */
.bnav{display:none}
@media(max-width:700px){
  .bnav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:80;background:color-mix(in srgb,var(--surface) 92%,transparent);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:6px 4px 10px}
  .bnav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;color:var(--ink-3);font-size:10px;font-weight:500}
  .bnav a.on{color:var(--ink)}
  .bnav a.sell{color:var(--accent-ink)}
  .bnav a.sell .mk{width:40px;height:40px;border-radius:999px;background:var(--accent);display:grid;place-items:center;margin-top:-18px;box-shadow:0 6px 14px color-mix(in srgb,var(--accent) 40%,transparent)}
  .bnav svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8}
  .bnav a.sell svg{width:22px;height:22px}
}

/* =========== TWEAKS PANEL =========== */
.tweaks{display:none;position:fixed;right:20px;bottom:20px;width:300px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 20px 50px rgba(0,0,0,.18);z-index:300;overflow:hidden;font-family:var(--font-th)}
.tweaks.on{display:block}
.tweaks-h{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.tweaks-h strong{font-family:var(--font-display);font-size:13px;letter-spacing:.02em;text-transform:uppercase}
.tweaks-h button{color:var(--ink-3);padding:4px 8px}
.tweaks-b{padding:14px;display:flex;flex-direction:column;gap:14px;max-height:62vh;overflow-y:auto}
.tgroup{display:flex;flex-direction:column;gap:6px}
.tgroup label{font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;font-family:var(--font-mono)}
.swatches{display:flex;gap:6px;flex-wrap:wrap}
.swatch{width:26px;height:26px;border-radius:50%;border:2px solid transparent;cursor:pointer;position:relative}
.swatch.on{border-color:var(--ink)}
.swatch.on::after{content:"";position:absolute;inset:3px;border-radius:50%;box-shadow:inset 0 0 0 1.5px #fff}
.trow{display:flex;gap:4px}
.trow button{flex:1;padding:7px 8px;border:1px solid var(--line);border-radius:var(--radius-sm);font-size:12px;color:var(--ink-2);background:var(--surface)}
.trow button.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}

/* tiny icons via inline svg inheritance */
.ic{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;display:inline-block;vertical-align:middle}

/* =========== PRODUCT DETAIL PAGE (modal) =========== */
.pdp-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;overflow-y:auto;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.pdp{background:var(--bg);border-radius:calc(var(--radius) + 6px);width:100%;max-width:1240px;max-height:92vh;display:grid;grid-template-columns:1.15fr 1fr;overflow:hidden;position:relative;box-shadow:0 40px 80px rgba(0,0,0,.35);animation:slideUp .25s cubic-bezier(.2,.8,.2,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(20px) scale(.98)}to{opacity:1;transform:none}}
.pdp-close{position:absolute;top:12px;right:12px;z-index:10;width:36px;height:36px;border-radius:999px;background:color-mix(in srgb,var(--surface) 92%,transparent);color:var(--ink);display:grid;place-items:center;border:1px solid var(--line);backdrop-filter:blur(6px)}
.pdp-close:hover{background:var(--surface);border-color:var(--line-2)}

.pdp-gal{background:var(--surface-2);display:flex;flex-direction:column;padding:0;border-right:1px solid var(--line);position:relative}
.pdp-big{flex:1;min-height:420px;position:relative;display:flex;align-items:center;justify-content:center}
.pdp-arr{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:999px;background:color-mix(in srgb,var(--surface) 88%,transparent);display:grid;place-items:center;font-size:22px;line-height:1;color:var(--ink);border:1px solid var(--line);backdrop-filter:blur(4px)}
.pdp-arr:hover{background:var(--surface)}
.pdp-arr.l{left:16px}.pdp-arr.r{right:16px}
.pdp-thumbs{display:flex;gap:8px;padding:12px;background:var(--surface);border-top:1px solid var(--line)}
.pdp-th{width:70px;height:70px;border-radius:var(--radius-sm);border:2px solid transparent;cursor:pointer}
.pdp-th.on{border-color:var(--ink)}

.pdp-side{display:flex;flex-direction:column;overflow-y:auto;background:var(--surface)}
.pdp-head{padding:22px 26px 18px;border-bottom:1px solid var(--line)}
.pdp-crumb{font-size:11px;color:var(--ink-3);letter-spacing:.08em;margin-bottom:10px}
.pdp-title{font-family:var(--font-display);font-size:22px;font-weight:700;letter-spacing:-.015em;line-height:1.3;margin-bottom:10px}
.pdp-price{font-family:var(--font-display);font-size:32px;font-weight:800;letter-spacing:-.02em}
.pdp-price s{color:var(--ink-3);font-weight:400;font-size:18px;margin-left:10px}
.pdp-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}

.pdp-seller{display:flex;align-items:center;gap:12px;padding:16px 26px;border-bottom:1px solid var(--line);background:var(--surface-2)}
.pdp-av{width:44px;height:44px;border-radius:999px;background:var(--surface);display:grid;place-items:center;font-weight:700;color:var(--ink);font-size:14px;border:1px solid var(--line);flex-shrink:0}
.pdp-sname{font-weight:600;font-size:14px;display:flex;align-items:center;gap:6px}
.pdp-badge{font-size:10px;padding:2px 7px;border-radius:999px;background:var(--pos);color:#fff;font-weight:500;letter-spacing:.02em}
.pdp-smeta{font-size:11px;color:var(--ink-3);margin-top:2px}

.pdp-desc{padding:18px 26px;border-bottom:1px solid var(--line)}
.pdp-desc h3{font-family:var(--font-display);font-size:14px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);margin-bottom:10px;font-weight:600}
.pdp-desc p{font-size:14px;line-height:1.6;color:var(--ink-2)}
.pdp-spec{margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:8px 18px}
.pdp-spec>div{display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px dashed var(--line)}
.pdp-spec dt{color:var(--ink-3)}
.pdp-spec dd{color:var(--ink);font-weight:500;font-family:var(--font-mono);text-align:right}
.pdp-safe{margin-top:14px;padding:10px 12px;background:var(--surface-2);border-radius:var(--radius-sm);display:flex;gap:8px;align-items:center;font-size:12px;color:var(--ink-2);border:1px solid var(--line)}
.pdp-safe svg{color:var(--pos);flex-shrink:0}

.pdp-chat{border-bottom:1px solid var(--line);display:flex;flex-direction:column;background:var(--surface)}
.pdp-chat-h{padding:16px 26px 10px;display:flex;justify-content:space-between;align-items:baseline;gap:8px;border-bottom:1px solid var(--line)}
.pdp-chat-h h3{font-family:var(--font-display);font-size:15px;font-weight:700;letter-spacing:-.005em}
.pdp-chat-body{max-height:340px;overflow-y:auto;padding:14px 20px;background:var(--surface-2);display:flex;flex-direction:column;gap:8px}

.pdp-chat-pin{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:10px;margin-bottom:8px}
.pin-prod{display:flex;gap:10px;align-items:center}
.pin-img{width:42px;height:42px;border-radius:var(--radius-sm);flex-shrink:0}
.pin-t{font-size:12px;font-weight:500;overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;text-overflow:ellipsis}
.pin-p{font-family:var(--font-display);font-weight:700;font-size:14px;margin-top:2px}
.pin-note{font-size:10px;color:var(--ink-3);text-align:center;margin-top:6px;padding-top:6px;border-top:1px dashed var(--line);letter-spacing:.06em;text-transform:uppercase}

.msg{display:flex;gap:8px;align-items:flex-end;max-width:85%}
.msg.me{align-self:flex-end;flex-direction:row-reverse}
.msg-av{width:24px;height:24px;border-radius:999px;background:var(--surface);border:1px solid var(--line);display:grid;place-items:center;font-size:10px;font-weight:600;color:var(--ink-2);flex-shrink:0}
.msg-grp{display:flex;flex-direction:column;gap:2px}
.msg.me .msg-grp{align-items:flex-end}
.msg-b{padding:9px 13px;border-radius:16px;font-size:13.5px;line-height:1.45;background:var(--surface);border:1px solid var(--line);color:var(--ink);max-width:100%;word-break:break-word}
.msg.me .msg-b{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);border-bottom-right-radius:4px}
.msg.seller .msg-b{border-bottom-left-radius:4px}
.msg-t{font-size:10px;color:var(--ink-3);padding:0 6px}
.msg-b.typing{display:flex;gap:4px;align-items:center;padding:12px 14px}
.msg-b.typing span{width:6px;height:6px;border-radius:999px;background:var(--ink-3);animation:bop 1.2s infinite ease-in-out}
.msg-b.typing span:nth-child(2){animation-delay:.15s}
.msg-b.typing span:nth-child(3){animation-delay:.3s}
@keyframes bop{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}

.pdp-quick{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;background:var(--surface);border-top:1px solid var(--line);scrollbar-width:none}
.pdp-quick::-webkit-scrollbar{display:none}
.pdp-quick button{white-space:nowrap;padding:6px 12px;border:1px solid var(--line);border-radius:999px;font-size:12px;color:var(--ink-2);background:var(--surface)}
.pdp-quick button:hover{border-color:var(--ink);color:var(--ink)}

.pdp-input{display:flex;gap:8px;padding:12px 16px;align-items:center;background:var(--surface);border-top:1px solid var(--line)}
.pdp-inp-btn{padding:8px;color:var(--ink-3);border-radius:var(--radius-sm)}
.pdp-inp-btn:hover{background:var(--surface-2);color:var(--ink)}
.pdp-input input{flex:1;padding:10px 14px;border:1px solid var(--line);border-radius:999px;background:var(--surface-2);font-family:inherit;font-size:13.5px;color:var(--ink)}
.pdp-input input:focus{outline:none;border-color:var(--line-2);background:var(--surface)}
.pdp-send{padding:8px 18px;background:var(--accent);color:var(--accent-ink);border-radius:999px;font-size:13px;font-weight:600}
.pdp-send:disabled{opacity:.4;cursor:not-allowed}

.pdp-related{padding:16px 26px 26px}
.pdp-related h3{font-family:var(--font-display);font-size:14px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);margin-bottom:12px;font-weight:600}
.pdp-rel-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.pdp-rel{cursor:pointer}
.pdp-rel-img{aspect-ratio:1/1;border-radius:var(--radius-sm);margin-bottom:6px}
.pdp-rel-p{font-family:var(--font-display);font-weight:700;font-size:13px}

.pcard{cursor:pointer}

@media(max-width:900px){
  .pdp-overlay{padding:0}
  .pdp{grid-template-columns:1fr;max-height:100vh;border-radius:0;max-width:none}
  .pdp-gal{border-right:none;border-bottom:1px solid var(--line)}
  .pdp-big{min-height:340px}
  .pdp-rel-row{grid-template-columns:repeat(3,1fr)}
  .pdp-spec{grid-template-columns:1fr}
}

/* =========== LISTING FLOW =========== */
.lst{background:var(--bg);border-radius:calc(var(--radius) + 6px);width:100%;max-width:860px;max-height:92vh;display:grid;grid-template-rows:auto 1fr auto;overflow:hidden;position:relative;box-shadow:0 40px 80px rgba(0,0,0,.35);animation:slideUp .25s cubic-bezier(.2,.8,.2,1)}

.lst-stepper{padding:18px 28px 16px;border-bottom:1px solid var(--line);background:var(--surface);display:grid;grid-template-columns:auto 1fr auto;gap:20px;align-items:center}
.lst-steps{display:flex;justify-content:center;gap:4px;align-items:center}
.lst-s{display:flex;align-items:center;gap:10px;position:relative;color:var(--ink-3)}
.lst-s-n{width:24px;height:24px;border-radius:999px;border:1.5px solid var(--line-2);display:grid;place-items:center;font-size:11px;font-weight:600;background:var(--surface);color:var(--ink-3)}
.lst-s-nm{font-size:12px;font-weight:500}
.lst-s-line{width:28px;height:1.5px;background:var(--line-2);margin:0 8px}
.lst-s.on{color:var(--ink)}
.lst-s.on .lst-s-n{background:var(--ink);border-color:var(--ink);color:var(--bg)}
.lst-s.done{color:var(--ink-2)}
.lst-s.done .lst-s-n{background:var(--pos);border-color:var(--pos);color:#fff}
.lst-s.done .lst-s-line, .lst-s.on .lst-s-line{background:var(--ink)}
.lst-sub{font-size:11px;color:var(--ink-3);letter-spacing:.06em;text-transform:uppercase}
@media(max-width:700px){
  .lst-stepper{grid-template-columns:1fr;padding:14px 18px}
  .lst-logo,.lst-sub{display:none}
  .lst-s-nm{display:none}
  .lst-s-line{width:40px}
}

.lst-body{overflow-y:auto;padding:28px 36px;background:var(--bg)}
.lst-step{max-width:640px;margin:0 auto;display:flex;flex-direction:column;gap:18px}
.lst-h h2{font-family:var(--font-display);font-size:26px;letter-spacing:-.02em;font-weight:700;margin-bottom:6px}
.lst-h p{color:var(--ink-2);font-size:14px}

/* photos */
.lst-photos{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.lst-ph{position:relative;border-radius:var(--radius-sm);overflow:hidden}
.lst-ph.cover{grid-column:span 2;grid-row:span 2}
.lst-cover-tag{position:absolute;top:8px;left:8px;background:var(--ink);color:var(--bg);font-size:10px;padding:3px 8px;border-radius:999px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.lst-ph-x{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:999px;background:color-mix(in srgb,var(--ink) 80%,transparent);color:#fff;font-size:16px;line-height:1;display:grid;place-items:center}
.lst-ph-mv{position:absolute;bottom:8px;right:8px;width:24px;height:24px;border-radius:var(--radius-sm);background:color-mix(in srgb,var(--surface) 85%,transparent);color:var(--ink);font-size:13px;line-height:1;display:grid;place-items:center;backdrop-filter:blur(4px)}
.lst-add{aspect-ratio:1/1;border:2px dashed var(--line-2);border-radius:var(--radius-sm);background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--ink-2);font-size:13px;font-weight:500;cursor:pointer;transition:.15s}
.lst-add:hover{border-color:var(--accent);color:var(--accent);background:color-mix(in srgb,var(--accent) 4%,var(--surface))}
.lst-add-n{font-size:10px;color:var(--ink-3)}

.lst-tips{background:var(--surface-2);border-radius:var(--radius);padding:16px 20px;border:1px dashed var(--line-2)}
.lst-tips h4{font-family:var(--font-display);font-size:13px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;color:var(--ink-2);font-weight:600}
.lst-tips ul{list-style:none;display:flex;flex-direction:column;gap:4px}
.lst-tips li{font-size:13px;color:var(--ink-2);padding-left:14px;position:relative}
.lst-tips li::before{content:'';position:absolute;left:0;top:9px;width:4px;height:4px;border-radius:999px;background:var(--accent)}

/* form */
.lst-field{display:flex;flex-direction:column;gap:6px}
.lst-field label{font-size:12px;font-weight:600;color:var(--ink-2);letter-spacing:.02em}
.lst-req{color:var(--neg)}
.lst-field input, .lst-field textarea, .lst-field select{padding:11px 14px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--surface);font-family:inherit;font-size:14px;color:var(--ink);transition:.15s}
.lst-field input:focus, .lst-field textarea:focus, .lst-field select:focus{outline:none;border-color:var(--ink);background:var(--surface)}
.lst-field textarea{resize:vertical;min-height:100px;line-height:1.5}
.lst-help{font-size:11px;color:var(--ink-3);letter-spacing:.02em}
.lst-row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:600px){.lst-row2{grid-template-columns:1fr}}

.lst-chk{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-2);margin-top:8px;cursor:pointer}
.lst-chk input{width:16px;height:16px;accent-color:var(--accent)}

.lst-price-wrap{display:flex;align-items:center;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--surface)}
.lst-price-wrap:focus-within{border-color:var(--ink)}
.lst-baht{padding:0 14px;color:var(--ink-3);font-size:18px;font-weight:500}
.lst-price-in{border:none !important;flex:1;padding:14px 14px 14px 0 !important;font-size:22px !important;font-family:var(--font-display) !important;font-weight:700;letter-spacing:-.015em}
.lst-price-in:focus{background:transparent !important;border:none !important}

.lst-chips{display:flex;flex-wrap:wrap;gap:6px}
.lst-chip{padding:8px 14px;border:1px solid var(--line);border-radius:999px;font-size:13px;color:var(--ink-2);background:var(--surface);cursor:pointer;font-family:inherit}
.lst-chip:hover{border-color:var(--line-2)}
.lst-chip.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}

/* ai */
.ai-write{display:inline-flex;align-items:center;gap:10px;padding:12px 16px;border:1px solid var(--line);border-radius:var(--radius);background:linear-gradient(120deg,var(--surface),color-mix(in srgb,var(--accent) 4%,var(--surface)));font-family:inherit;font-size:13.5px;font-weight:500;color:var(--ink);cursor:pointer;align-self:flex-start;transition:.15s;width:100%;justify-content:flex-start}
.ai-write:hover{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,var(--surface))}
.ai-write:disabled{opacity:.6;cursor:wait}
.ai-write svg{color:var(--accent)}
.ai-beta{font-size:9px;padding:2px 7px;border-radius:3px;background:var(--ink);color:var(--bg);letter-spacing:.08em;margin-left:auto}
.lst-err{font-size:12px;color:var(--neg);padding:8px 12px;background:color-mix(in srgb,var(--neg) 8%,var(--surface));border-radius:var(--radius-sm);border:1px solid color-mix(in srgb,var(--neg) 30%,transparent)}

/* boost card */
.lst-boost{border:2px solid var(--line);border-radius:var(--radius);padding:18px 20px;cursor:pointer;transition:.18s;background:var(--surface);display:flex;flex-direction:column;gap:14px;position:relative;overflow:hidden}
.lst-boost:hover{border-color:var(--line-2)}
.lst-boost.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 4%,var(--surface))}
.lst-boost-h{display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
.lst-boost-h h3{font-family:var(--font-display);font-size:17px;letter-spacing:-.01em;font-weight:700;margin-bottom:4px}
.lst-boost-h p{font-size:13px;color:var(--ink-2);line-height:1.5}
.lst-boost-price{text-align:right;flex-shrink:0}
.lst-boost-amt{font-family:var(--font-display);font-size:32px;font-weight:800;color:var(--accent);letter-spacing:-.02em;line-height:1}
.lst-boost-bar{display:flex;flex-direction:column;gap:8px;padding:12px 14px;background:var(--surface-2);border-radius:var(--radius-sm)}
.lb-row{display:grid;grid-template-columns:60px 1fr 80px;gap:10px;align-items:center;font-size:12px;color:var(--ink-2)}
.lb-row span:last-child{text-align:right;color:var(--ink);font-weight:600}
.lb-track{height:8px;background:var(--line);border-radius:999px;overflow:hidden}
.lb-fill{height:100%;border-radius:999px;transition:width .5s ease}
.lst-boost-foot{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-2);padding-top:10px;border-top:1px dashed var(--line)}
.lst-boost.on .lst-boost-foot{color:var(--accent);font-weight:500}
.lst-boost-foot input{accent-color:var(--accent)}

/* preview */
.lst-preview-step{max-width:720px}
.lst-preview{display:grid;grid-template-columns:300px 1fr;gap:20px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
@media(max-width:650px){.lst-preview{grid-template-columns:1fr}}
.lst-pv-gal{display:flex;flex-direction:column;gap:6px}
.lst-pv-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.lst-pv-body{display:flex;flex-direction:column;gap:8px}
.lst-pv-title{font-family:var(--font-display);font-size:17px;letter-spacing:-.01em;font-weight:700;line-height:1.3}
.lst-pv-price{font-family:var(--font-display);font-size:26px;font-weight:800;letter-spacing:-.02em}
.lst-pv-tags{display:flex;flex-wrap:wrap;gap:6px}
.lst-pv-desc{font-size:13px;color:var(--ink-2);line-height:1.55;padding:10px 0;border-top:1px dashed var(--line);border-bottom:1px dashed var(--line)}
.lst-pv-meta{font-size:11px;color:var(--ink-3)}

.lst-summary{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px}
.lst-summary h4{font-family:var(--font-display);font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);margin-bottom:10px;font-weight:600}
.lst-sum-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;color:var(--ink-2)}
.lst-sum-row.pos, .lst-sum-row .pos{color:var(--pos);font-weight:600}
.lst-sum-row.total{padding-top:10px;border-top:1px solid var(--line);margin-top:4px;font-size:15px;color:var(--ink);font-weight:600}
.lst-sum-note{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);font-size:10px;color:var(--ink-3);letter-spacing:.02em;line-height:1.5;text-transform:none}

/* foot */
.lst-foot{padding:16px 28px;border-top:1px solid var(--line);background:var(--surface);display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:center}
.lst-foot > :last-child{justify-self:end}
.lst-foot-progress{font-size:11px;color:var(--ink-3);letter-spacing:.06em;text-align:center;text-transform:uppercase}
@media(max-width:600px){
  .lst-body{padding:20px 18px}
  .lst-foot{padding:12px 18px}
  .lst-foot-progress{display:none}
  .lst-foot{grid-template-columns:1fr 1fr}
}

/* =========== AUTH MODAL (login / signup / reset) =========== */
.auth-overlay{align-items:center;padding:24px}
.auth{background:var(--bg);border-radius:calc(var(--radius) + 6px);width:100%;max-width:440px;padding:36px 36px 28px;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.35);max-height:92vh;overflow-y:auto;animation:fadeIn .15s ease}
.auth-logo{margin-bottom:18px}
.auth-h{font-family:var(--font-disp);font-size:28px;font-weight:600;letter-spacing:-.01em;margin:0 0 4px;color:var(--ink)}
.auth-s{font-size:13px;color:var(--ink-2);margin:0 0 22px}

.auth-social{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.auth-soc{display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 12px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--bg);font-size:13px;font-weight:500;color:var(--ink);transition:background .12s,border-color .12s}
.auth-soc:hover{background:var(--surface);border-color:var(--ink-3)}
.auth-soc:disabled{opacity:.6;cursor:not-allowed}
.auth-soc span{letter-spacing:.01em}

.auth-or{display:flex;align-items:center;gap:12px;margin:18px 0;font-size:11px;color:var(--ink-3);letter-spacing:.1em;text-transform:uppercase}
.auth-or::before,.auth-or::after{content:'';flex:1;height:1px;background:var(--line)}

.auth-form{display:flex;flex-direction:column;gap:14px}
.auth-form .lst-field label{display:flex;justify-content:space-between;align-items:baseline;text-transform:none;letter-spacing:0;font-size:12px}
.auth-linklite{font-size:11px;font-weight:500;color:var(--accent);letter-spacing:0;text-transform:none}
.auth-linklite:hover{text-decoration:underline}

.auth-pw{position:relative}
.auth-pw input{width:100%;padding-right:42px}
.auth-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);padding:4px;color:var(--ink-3);display:flex}
.auth-eye:hover{color:var(--ink)}

.auth-msg{font-size:12px;color:var(--ink);padding:10px 12px;background:color-mix(in srgb,var(--accent) 10%,var(--surface));border-radius:var(--radius-sm);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);line-height:1.5}

.auth-submit{width:100%;margin-top:4px}
.auth-submit:disabled{opacity:.65;cursor:wait}

.auth-terms{font-size:11px;color:var(--ink-3);line-height:1.6;margin:2px 0 0;text-align:center}
.auth-terms a{color:var(--ink-2);text-decoration:underline;cursor:pointer}

.auth-switch{margin-top:20px;padding-top:18px;border-top:1px solid var(--line);text-align:center;font-size:13px;color:var(--ink-2)}
.auth-switch button{color:var(--accent);font-weight:600;padding:0 2px}
.auth-switch button:hover{text-decoration:underline}

@media(max-width:520px){
  .auth{padding:28px 22px 22px;border-radius:calc(var(--radius) + 4px)}
  .auth-social{grid-template-columns:1fr 1fr}
  .auth-h{font-size:24px}
}

/* =========== HUB (Seller/Buyer) — slide-in drawer from right =========== */
.hub-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:190;animation:fadeIn .15s ease;backdrop-filter:blur(2px)}
.hub{position:fixed;top:0;right:0;width:min(480px,100vw);height:100vh;background:var(--surface);display:flex;flex-direction:column;box-shadow:-8px 0 32px rgba(0,0,0,.12);animation:slideInRight .22s cubic-bezier(.2,.8,.2,1)}
@keyframes slideInRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
.hub-side{border-bottom:1px solid var(--line);padding:14px 18px;display:flex;flex-direction:column;gap:12px;background:var(--surface);flex-shrink:0}
.hub-side-top{display:flex;flex-direction:column;gap:12px}
.hub-back{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-3);padding:4px 6px;margin-left:-6px;border-radius:var(--radius-sm);letter-spacing:.02em}
.hub-back:hover{background:var(--surface);color:var(--ink)}
.hub-back span{font-weight:500}

.hub-mode-switch{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:4px;background:var(--surface);border-radius:var(--radius-sm)}
.hub-mode-switch button{padding:10px;font-size:16px;font-weight:700;font-family:var(--font-disp);border-radius:calc(var(--radius-sm) - 2px);color:var(--ink-2);letter-spacing:-.01em}
.hub-mode-switch button.on{background:var(--bg);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08)}

.hub-create{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;background:color-mix(in srgb,var(--accent) 12%,transparent);color:var(--accent);font-weight:600;font-size:13px;border-radius:var(--radius-sm);border:1px dashed color-mix(in srgb,var(--accent) 40%,transparent)}
.hub-create:hover{background:color-mix(in srgb,var(--accent) 18%,transparent)}

.hub-nav{display:flex;flex-direction:column;gap:2px;margin-top:4px}
.hub-nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius-sm);font-size:13px;color:var(--ink);text-align:left}
.hub-nav-item:hover{background:var(--surface)}
.hub-nav-item.on{background:color-mix(in srgb,var(--accent) 14%,transparent);color:var(--accent);font-weight:600}
.hub-nav-ic{width:24px;display:flex;justify-content:center;color:var(--ink-2)}
.hub-nav-item.on .hub-nav-ic{color:var(--accent)}

.hub-main{padding:18px 20px 40px;min-width:0;overflow-y:auto;flex:1}
.hub-page{max-width:920px;margin:0 auto;display:flex;flex-direction:column;gap:14px}
.hub-h1{font-family:var(--font-disp);font-size:20px;font-weight:700;letter-spacing:-.01em;margin:0;color:var(--ink)}
.hub-sub{font-size:13px;color:var(--ink-2);margin:-8px 0 4px}
.hub-h-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.hub-h-row .hub-h1{flex:1;min-width:200px}
.hub-search{flex:1;max-width:340px;display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface);border-radius:999px}
.hub-search svg{color:var(--ink-3)}
.hub-search input{flex:1;background:transparent;border:none;outline:none;font-family:inherit;font-size:13px;color:var(--ink)}
.hub-viewtog{display:flex;gap:2px;background:var(--surface);padding:3px;border-radius:var(--radius-sm)}
.hub-viewtog button{padding:6px 10px;color:var(--ink-3);border-radius:calc(var(--radius-sm) - 2px)}
.hub-viewtog button.on{background:var(--bg);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.hub-textbtn{font-size:12px;font-weight:500;color:var(--accent);padding:6px 10px}
.hub-textbtn:hover{text-decoration:underline}

/* banner */
.hub-banner{display:grid;grid-template-columns:auto 1fr auto;gap:14px;padding:14px 16px;background:color-mix(in srgb,var(--accent) 6%,var(--surface));border:1px solid color-mix(in srgb,var(--accent) 25%,transparent);border-radius:var(--radius);align-items:start}
.hub-banner-ic{color:var(--accent);padding-top:2px}
.hub-banner-body h4{font-size:14px;font-weight:600;margin:0 0 4px;color:var(--ink)}
.hub-banner-body p{font-size:12px;color:var(--ink-2);margin:0 0 10px;line-height:1.5}
.hub-banner-cta{padding:10px 22px;background:var(--accent);color:var(--accent-ink);border-radius:var(--radius-sm);font-size:13px;font-weight:600}
.hub-banner-close{font-size:20px;color:var(--ink-3);padding:0 6px;align-self:start}

/* chips */
.hub-chips{display:flex;gap:8px;flex-wrap:wrap}
.hub-chips button{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:999px;background:var(--surface);font-size:12px;color:var(--ink-2);font-weight:500}
.hub-chips button span{background:var(--bg);padding:1px 7px;border-radius:999px;font-size:11px;color:var(--ink-3)}
.hub-chips button.on{background:var(--ink);color:var(--bg)}
.hub-chips button.on span{background:color-mix(in srgb,var(--bg) 30%,transparent);color:var(--bg)}

/* listing row */
.hub-list{display:flex;flex-direction:column;gap:12px}
.lr{display:grid;grid-template-columns:180px 1fr;gap:16px;padding:16px;border:1px solid var(--line);border-radius:var(--radius);background:var(--bg);transition:border-color .12s}
.lr:hover{border-color:var(--ink-3)}
.lr-ph{aspect-ratio:1;border-radius:var(--radius-sm);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.lr-ph-mark{width:50%;height:50%;opacity:.6}
.lr-boost{position:absolute;top:8px;left:8px;background:var(--ink);color:var(--bg);font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:.08em}
.lr-body{display:flex;flex-direction:column;gap:6px;min-width:0}
.lr-notice{font-size:11px;color:var(--accent);display:flex;align-items:center;gap:4px}
.lr-notice b{font-size:14px}
.lr-title{font-size:15px;font-weight:500;color:var(--ink);line-height:1.4}
.lr-price{font-size:15px;font-weight:700;color:var(--ink);display:flex;gap:8px;align-items:baseline}
.lr-price s{font-size:12px;color:var(--ink-3);font-weight:400}
.lr-meta{font-size:12px;color:var(--ink-2)}
.lr-stats{font-size:11px;color:var(--ink-3);line-height:1.5}
.lr-stats b{color:var(--ink);font-weight:600}
.lr-info{opacity:.5}
.lr-actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.lr-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;background:var(--surface);border-radius:var(--radius-sm);font-size:12px;font-weight:500;color:var(--ink);transition:background .12s}
.lr-btn:hover{background:var(--surface-2)}
.lr-btn.primary{background:color-mix(in srgb,var(--accent) 14%,transparent);color:var(--accent)}
.lr-btn.primary:hover{background:color-mix(in srgb,var(--accent) 22%,transparent)}
.lr-more{padding:7px 10px}

/* status dot */
.st-dot{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--ink-2)}
.st-dot i{width:7px;height:7px;border-radius:50%;display:inline-block}

/* grid view */
.hub-list-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.lg{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color .12s;display:flex;flex-direction:column}
.lg:hover{border-color:var(--ink-3)}
.lg-ph{aspect-ratio:1;position:relative}
.lg-st{position:absolute;bottom:8px;left:8px;background:var(--bg);padding:3px 8px;border-radius:999px;font-size:11px}
.lg-body{padding:10px 12px;display:flex;flex-direction:column;gap:4px}
.lg-title{font-size:13px;color:var(--ink);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.lg-stats{display:flex;gap:10px;font-size:11px;color:var(--ink-3)}

/* empty */
.hub-empty{text-align:center;padding:60px 20px;color:var(--ink-3)}
.hub-empty-ic{font-size:40px;margin-bottom:12px;opacity:.6}

/* insights */
.ins-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.ins-card{padding:16px;border:1px solid var(--line);border-radius:var(--radius);background:var(--bg)}
.ins-k{font-size:12px;color:var(--ink-2);margin-bottom:6px}
.ins-v{font-family:var(--font-mono);font-size:28px;font-weight:600;color:var(--ink);letter-spacing:-.02em}
.ins-d{font-size:11px;color:var(--ink-3);margin-top:4px}
.ins-d.up{color:var(--pos)}
.ins-d.down{color:var(--neg)}
.ins-chart{padding:20px;border:1px solid var(--line);border-radius:var(--radius);background:var(--bg)}
.ins-chart-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ins-chart-h h3{font-size:14px;font-weight:600;margin:0}
.ins-chart-legend{font-size:11px;color:var(--ink-3);display:flex;align-items:center;gap:5px}
.ins-chart-legend .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.ins-svg{width:100%;height:auto;display:block}
.ins-top{padding:20px;border:1px solid var(--line);border-radius:var(--radius);background:var(--bg)}
.ins-top h3{font-size:14px;font-weight:600;margin:0 0 12px}
.ins-top-list{display:flex;flex-direction:column;gap:10px}
.ins-top-row{display:grid;grid-template-columns:auto 56px 1fr auto;gap:12px;align-items:center}
.ins-rank{font-family:var(--font-mono);font-size:14px;color:var(--ink-3);width:20px;text-align:right}
.ins-top-ph{width:56px;height:56px;border-radius:var(--radius-sm)}
.ins-top-t{font-size:13px;color:var(--ink);line-height:1.4;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.ins-top-m{font-size:11px;color:var(--ink-2);margin-top:2px;display:flex;gap:6px;align-items:center}
.ins-top-n{display:flex;gap:14px}
.ins-top-n > div{text-align:center}
.ins-top-n b{display:block;font-family:var(--font-mono);font-size:14px;color:var(--ink)}
.ins-top-n span{font-size:10px;color:var(--ink-3)}

/* news */
.news-list{display:flex;flex-direction:column;gap:10px}
.news-card{padding:16px;border:1px solid var(--line);border-radius:var(--radius);background:var(--bg);position:relative}
.news-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:3px;background:var(--surface);color:var(--ink-2);letter-spacing:.04em;margin-bottom:8px;font-weight:600}
.news-tag.t-0{background:color-mix(in srgb,var(--accent) 18%,transparent);color:var(--accent)}
.news-tag.t-3{background:color-mix(in srgb,var(--neg) 14%,transparent);color:var(--neg)}
.news-card h3{font-size:15px;font-weight:600;margin:0 0 6px;color:var(--ink)}
.news-card p{font-size:12px;color:var(--ink-2);margin:0 0 10px;line-height:1.6}
.news-card footer{font-size:11px;color:var(--ink-3)}
.news-card footer a{color:var(--accent);cursor:pointer}

/* buy activity */
.act-list{display:flex;flex-direction:column;gap:8px}
.act-row{display:grid;grid-template-columns:60px 1fr auto;gap:12px;padding:12px;border:1px solid var(--line);border-radius:var(--radius);align-items:center;cursor:pointer;transition:border-color .12s}
.act-row:hover{border-color:var(--ink-3)}
.act-ph{width:60px;height:60px;border-radius:var(--radius-sm)}
.act-body{min-width:0}
.act-kind{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em;font-weight:500;margin-bottom:3px}
.act-title{font-size:13px;color:var(--ink);line-height:1.4;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.act-det{font-size:12px;color:var(--ink-2);margin-top:3px;font-style:italic}
.act-meta{font-size:11px;color:var(--ink-3);margin-top:4px}
.act-when{font-size:11px;color:var(--ink-3);white-space:nowrap}

/* saved grid */
.hub-sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.sv-card{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;cursor:pointer;display:flex;flex-direction:column;transition:border-color .12s}
.sv-card:hover{border-color:var(--ink-3)}
.sv-ph{aspect-ratio:1;position:relative}
.sv-unsave{position:absolute;top:8px;right:8px;width:30px;height:30px;background:var(--bg);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--accent);box-shadow:0 2px 6px rgba(0,0,0,.15)}
.sv-body{padding:10px 12px;display:flex;flex-direction:column;gap:4px;flex:1}
.sv-title{font-size:12px;color:var(--ink-2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sv-meta{font-size:11px;color:var(--ink-3);margin-top:auto}

/* notifications */
.nt-list{display:flex;flex-direction:column;gap:4px}
.nt-row{display:grid;grid-template-columns:36px 48px 1fr auto;gap:12px;padding:12px;border-radius:var(--radius-sm);align-items:center;transition:background .12s}
.nt-row:hover{background:var(--surface)}
.nt-row.unread{background:color-mix(in srgb,var(--accent) 6%,transparent)}
.nt-ic{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--surface);color:var(--ink-2);font-size:14px;font-weight:600}
.nt-ic.drop{background:color-mix(in srgb,var(--pos) 18%,transparent);color:var(--pos)}
.nt-ic.reply{background:color-mix(in srgb,var(--accent) 18%,transparent);color:var(--accent)}
.nt-ic.star{background:#fbeacc;color:#b87a0a}
.nt-ic.offer{background:color-mix(in srgb,var(--accent) 12%,transparent);color:var(--accent)}
.nt-ph{width:48px;height:48px;border-radius:var(--radius-sm)}
.nt-body{min-width:0}
.nt-kind{font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:2px}
.nt-text{font-size:13px;color:var(--ink);line-height:1.4}
.nt-sub{font-size:12px;color:var(--ink-2);margin-top:2px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.nt-when{font-size:11px;color:var(--ink-3);margin-top:3px}
.nt-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;align-self:center}

/* following */
.fl-list{display:flex;flex-direction:column;gap:8px}
.fl-row{display:grid;grid-template-columns:48px 1fr auto;gap:12px;padding:14px;border:1px solid var(--line);border-radius:var(--radius);align-items:center}
.fl-ava{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 50%,var(--ink)));color:var(--accent-ink);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px}
.fl-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
.fl-name{font-size:14px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:8px}
.fl-new{background:var(--accent);color:var(--accent-ink);font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600}
.fl-rating{font-size:12px;color:var(--ink-2)}
.fl-rating span{color:var(--ink-3)}
.fl-meta{font-size:11px;color:var(--ink-3);margin-top:3px}
.fl-actions{display:flex;gap:6px}

/* hub profile */
.pr-card{display:grid;grid-template-columns:auto 1fr auto;gap:18px;padding:20px;border:1px solid var(--line);border-radius:var(--radius);align-items:center}
.pr-ava{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 40%,var(--ink)));color:var(--accent-ink);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:26px;font-family:var(--font-disp)}
.pr-body h3{font-size:18px;font-weight:600;margin:0 0 3px;font-family:var(--font-disp)}
.pr-rating{font-size:12px;color:var(--ink-2);margin-bottom:8px}
.pr-rating span{color:var(--ink-3)}
.pr-stats{display:flex;gap:22px}
.pr-stats > div{text-align:left}
.pr-stats b{display:block;font-family:var(--font-mono);font-size:16px;color:var(--ink)}
.pr-stats span{font-size:11px;color:var(--ink-3)}
.pr-section{padding:18px 20px;border:1px solid var(--line);border-radius:var(--radius)}
.pr-section h3{font-size:14px;font-weight:600;margin:0 0 12px}
.pr-kv{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid var(--line)}
.pr-kv:last-child{border:none}
.pr-kv span{color:var(--ink-3)}
.pr-rev{display:grid;grid-template-columns:40px 1fr;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
.pr-rev:last-child{border:none}
.pr-rev-ava{width:40px;height:40px;border-radius:50%;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--ink)}
.pr-rev-h{font-size:13px;display:flex;gap:8px;align-items:baseline}
.pr-rev-stars{color:#ebb30c;letter-spacing:2px;font-size:11px}
.pr-rev-d{font-size:13px;color:var(--ink-2);margin:4px 0;line-height:1.5}
.pr-rev-w{font-size:11px;color:var(--ink-3)}

@media(max-width:480px){
  .hub{width:100vw}
}

/* Drawer-narrow rules: simplify wide inner layouts to single column */
.hub-main .lr{grid-template-columns:100px 1fr !important;gap:12px !important;padding:10px !important}
.hub-main .ins-top-row{grid-template-columns:1fr !important}
.hub-main .ins-top-n{justify-content:space-around !important;margin-top:6px !important}
.hub-main .pr-card{grid-template-columns:auto 1fr !important;gap:12px !important}
.hub-main .pr-card > .lr-btn{grid-column:1/-1 !important}
.hub-main .pr-stats{flex-wrap:wrap !important;gap:12px !important}
.hub-main .hub-h1{font-size:18px !important}
.hub-main .hub-search{max-width:none !important}

/* =========== CHAT INBOX (Messenger-style) =========== */
.ch-overlay{position:fixed;inset:0;background:var(--bg);z-index:195;animation:fadeIn .15s ease;display:flex}
.ch{display:grid;grid-template-columns:320px 1fr 300px;height:100vh;width:100%;max-width:1500px;margin:0 auto}

/* Left: list */
.ch-list{border-right:1px solid var(--line);display:flex;flex-direction:column;min-width:0;background:var(--bg)}
.ch-list-top{display:flex;align-items:center;gap:10px;padding:14px 16px 10px}
.ch-list-top h1{flex:1;font-family:var(--font-disp);font-size:20px;font-weight:600;margin:0;letter-spacing:-.01em}
.ch-back{padding:6px;color:var(--ink-2);border-radius:50%;display:flex}
.ch-back:hover{background:var(--surface);color:var(--ink)}
.ch-iconbtn{padding:8px;color:var(--ink-2);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .12s}
.ch-iconbtn:hover{background:var(--surface);color:var(--ink)}

.ch-search{margin:0 12px 8px;display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface);border-radius:999px}
.ch-search svg{color:var(--ink-3)}
.ch-search input{flex:1;background:transparent;border:none;outline:none;font-family:inherit;font-size:13px;color:var(--ink)}

.ch-tabs{display:flex;gap:6px;padding:0 12px 8px}
.ch-tabs button{padding:6px 12px;background:var(--surface);border-radius:999px;font-size:12px;color:var(--ink-2);font-weight:500}
.ch-tabs button.on{background:var(--ink);color:var(--bg)}

.ch-threads{flex:1;overflow-y:auto;padding:0 6px 12px}
.ch-th{width:100%;display:grid;grid-template-columns:50px 1fr auto;gap:10px;padding:10px 10px;border-radius:var(--radius-sm);text-align:left;align-items:center;transition:background .12s;position:relative}
.ch-th:hover{background:var(--surface)}
.ch-th.on{background:color-mix(in srgb,var(--accent) 12%,transparent)}
.ch-th.on:hover{background:color-mix(in srgb,var(--accent) 16%,transparent)}

.ch-th-ava{position:relative;width:50px;height:50px}
.ch-ava{width:100%;height:100%;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:rgba(255,255,255,.9);font-family:var(--font-disp);letter-spacing:.02em;text-shadow:0 1px 2px rgba(0,0,0,.2)}
.ch-ava.sm{width:36px;height:36px;font-size:12px}
.ch-online{position:absolute;bottom:1px;right:1px;width:12px;height:12px;background:var(--pos);border:2px solid var(--bg);border-radius:50%}

.ch-th-body{min-width:0;display:flex;flex-direction:column;gap:1px}
.ch-th-top{display:flex;justify-content:space-between;align-items:baseline;gap:6px}
.ch-th-name{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-th-time{font-size:11px;color:var(--ink-3);flex-shrink:0}
.ch-th-mid{font-size:11px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-th-last{font-size:12px;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.ch-th.unread .ch-th-last{color:var(--ink);font-weight:600}
.ch-th.unread .ch-th-name{font-weight:700}
.ch-you{color:var(--ink-3)}

.ch-unread-dot{background:var(--accent);color:var(--accent-ink);font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:999px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.ch-pin{position:absolute;top:8px;right:8px;font-size:10px;opacity:.6}
.ch-empty-list{text-align:center;padding:40px 20px;font-size:13px;color:var(--ink-3)}

/* Middle: conversation */
.ch-conv{display:flex;flex-direction:column;min-width:0;border-right:1px solid var(--line);background:var(--bg)}
.ch-conv-h{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--line)}
.ch-conv-who{flex:1;min-width:0}
.ch-conv-who h2{font-size:15px;font-weight:600;margin:0;color:var(--ink)}
.ch-conv-who p{font-size:11px;color:var(--ink-3);margin:2px 0 0}
.ch-conv-actions{display:flex;gap:2px;color:var(--accent)}
.ch-conv-actions .ch-iconbtn{color:var(--accent)}

.ch-prod-pill{display:grid;grid-template-columns:56px 1fr auto;gap:12px;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--line);align-items:center;cursor:pointer;transition:background .12s}
.ch-prod-pill:hover{background:var(--surface-2)}
.ch-prod-ph{width:56px;height:56px;border-radius:var(--radius-sm)}
.ch-prod-body{min-width:0}
.ch-prod-t{font-size:13px;color:var(--ink);line-height:1.4;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;font-weight:500}
.ch-prod-p{font-size:12px;color:var(--ink-2);margin-top:3px;display:flex;gap:6px;align-items:baseline}
.ch-prod-p s{color:var(--ink-3);font-size:11px}
.ch-prod-view{padding:7px 14px;border-radius:var(--radius-sm);background:var(--bg);border:1px solid var(--line);font-size:12px;font-weight:500;color:var(--ink)}
.ch-prod-view:hover{background:var(--surface)}

.ch-body{flex:1;overflow-y:auto;padding:20px 20px 10px;display:flex;flex-direction:column;gap:2px}
.ch-daymark{text-align:center;font-size:11px;color:var(--ink-3);padding:10px 0 16px;letter-spacing:.04em}

.ch-msg{display:flex;gap:8px;max-width:75%;margin-bottom:2px}
.ch-msg.grouped{margin-top:-1px}
.ch-msg.them{align-self:flex-start}
.ch-msg.me{align-self:flex-end;flex-direction:row-reverse}
.ch-msg-ava{width:28px;height:28px;border-radius:50%;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--ink-2);flex-shrink:0;align-self:flex-end}
.ch-msg-ava.placeholder{background:transparent}
.ch-msg-col{display:flex;flex-direction:column;align-items:flex-start;gap:2px;min-width:0}
.ch-msg.me .ch-msg-col{align-items:flex-end}
.ch-msg-b{padding:9px 14px;border-radius:18px;background:var(--surface);color:var(--ink);font-size:14px;line-height:1.45;word-break:break-word;max-width:100%}
.ch-msg.me .ch-msg-b{background:var(--accent);color:var(--accent-ink)}
.ch-msg.grouped.them .ch-msg-b{border-top-left-radius:6px}
.ch-msg.grouped.me .ch-msg-b{border-top-right-radius:6px}
.ch-msg-t{font-size:10px;color:var(--ink-3);margin:2px 6px 0}
.ch-msg-img{width:240px;height:180px;border-radius:18px;background-size:cover}

/* Quick replies */
.ch-quick{display:flex;gap:6px;padding:8px 20px;overflow-x:auto;border-top:1px solid var(--line);scrollbar-width:none}
.ch-quick::-webkit-scrollbar{display:none}
.ch-quick button{flex-shrink:0;padding:7px 14px;background:var(--surface);border-radius:999px;font-size:12px;color:var(--ink-2);white-space:nowrap;transition:background .12s}
.ch-quick button:hover{background:var(--surface-2);color:var(--ink)}

/* Composer */
.ch-comp{display:flex;align-items:center;gap:4px;padding:10px 14px 14px;border-top:1px solid var(--line)}
.ch-comp-inp{flex:1;background:var(--surface);border:none;outline:none;padding:10px 16px;border-radius:999px;font-family:inherit;font-size:14px;color:var(--ink)}
.ch-comp-inp::placeholder{color:var(--ink-3)}
.ch-send{width:36px;height:36px;border-radius:50%;background:var(--accent);color:var(--accent-ink);display:flex;align-items:center;justify-content:center;padding:0}
.ch-send:hover{filter:brightness(.94)}
.ch-send svg{transform:translateX(-1px)}

/* Right: info sidebar */
.ch-info{overflow-y:auto;padding:20px 16px;background:var(--bg)}
.ch-info-hero{text-align:center;padding:8px 0 20px;border-bottom:1px solid var(--line)}
.ch-info-ava{width:72px;height:72px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:24px;color:rgba(255,255,255,.9);font-family:var(--font-disp);text-shadow:0 1px 3px rgba(0,0,0,.2)}
.ch-info-hero h3{font-family:var(--font-disp);font-size:16px;font-weight:600;margin:0 0 4px}
.ch-info-rate{font-size:12px;color:var(--ink-2);margin-bottom:3px}
.ch-info-rate span{color:var(--ink-3)}
.ch-info-bio{font-size:11px;color:var(--ink-3);line-height:1.5}

.ch-info-section{padding:14px 0;border-bottom:1px solid var(--line)}
.ch-info-section:last-child{border:none}
.ch-info-section h4{font-size:11px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;margin:0 0 10px}

.ch-info-prod{padding:10px;border-radius:var(--radius-sm);cursor:pointer;transition:background .12s}
.ch-info-prod:hover{background:var(--surface)}
.ch-info-prod-ph{aspect-ratio:16/10;border-radius:var(--radius-sm);margin-bottom:8px}
.ch-info-prod-t{font-size:13px;color:var(--ink);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ch-info-prod-p{font-size:14px;font-weight:700;margin-top:4px}
.ch-info-prod-m{font-size:11px;color:var(--ink-3);margin-top:3px}

.ch-act{width:100%;display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius-sm);text-align:left;font-size:13px;color:var(--ink);transition:background .12s}
.ch-act:hover{background:var(--surface)}
.ch-act span{font-size:16px;width:22px;text-align:center;opacity:.85}
.ch-act.danger{color:var(--neg)}

.ch-info-more{display:grid;grid-template-columns:44px 1fr;gap:10px;padding:8px;border-radius:var(--radius-sm);cursor:pointer;transition:background .12s;margin-bottom:4px;align-items:center}
.ch-info-more:hover{background:var(--surface)}
.ch-info-more-ph{width:44px;height:44px;border-radius:var(--radius-sm)}
.ch-info-more-t{font-size:12px;color:var(--ink);line-height:1.4;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.ch-info-more-p{font-size:12px;font-weight:600;color:var(--ink);margin-top:2px}

@media(max-width:1100px){
  .ch{grid-template-columns:280px 1fr}
  .ch-info{display:none}
}
@media(max-width:720px){
  .ch{grid-template-columns:1fr}
  .ch-list{display:none}
}

/* =========== STUBS (B5/B6/B7) shared chrome =========== */
.st-overlay{position:fixed;inset:0;background:var(--bg);z-index:195;display:flex;flex-direction:column;animation:fadeIn .15s ease}
.st-top{display:flex;align-items:center;gap:14px;padding:14px 24px;border-bottom:1px solid var(--line);background:var(--surface);flex-shrink:0}
.st-back{display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:var(--radius-sm);color:var(--ink-2);font-size:13px}
.st-back:hover{background:var(--surface-2);color:var(--ink)}
.st-title{flex:1;font-family:var(--font-disp);font-size:18px;font-weight:700;letter-spacing:-.01em;margin:0}
.st-primary{background:var(--accent);color:var(--accent-ink);padding:8px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600}

/* B5: Complaints two-panel */
.cp{flex:1;display:grid;grid-template-columns:360px 1fr;min-height:0;overflow:hidden}
.cp-list{border-right:1px solid var(--line);background:var(--surface);display:flex;flex-direction:column;min-height:0}
.cp-tabs{display:flex;gap:4px;padding:10px 12px;border-bottom:1px solid var(--line);overflow-x:auto}
.cp-tabs button{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:12px;color:var(--ink-2);white-space:nowrap;font-weight:500}
.cp-tabs button.on{background:var(--ink);color:var(--bg)}
.cp-tabs button .n{background:rgba(255,255,255,.15);padding:1px 6px;border-radius:999px;font-size:11px}
.cp-tabs button:not(.on) .n{background:var(--surface-2);color:var(--ink-3)}
.cp-items{flex:1;overflow-y:auto;padding:6px}
.cp-item{width:100%;text-align:left;padding:12px 14px;border-radius:var(--radius-sm);display:flex;flex-direction:column;gap:4px;color:var(--ink)}
.cp-item:hover{background:var(--surface-2)}
.cp-item.on{background:color-mix(in srgb,var(--accent) 10%,transparent)}
.cp-item-head{display:flex;align-items:center;gap:6px}
.cp-item-subj{flex:1;font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cp-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;flex-shrink:0}
.cp-item-meta{display:flex;gap:8px;align-items:center;font-size:12px;color:var(--ink-3)}
.cp-badge{padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}
.cp-badge.open{background:color-mix(in srgb,var(--warn) 18%,transparent);color:var(--warn)}
.cp-badge.pending{background:color-mix(in srgb,var(--ink-3) 18%,transparent);color:var(--ink-2)}
.cp-badge.resolved{background:color-mix(in srgb,var(--pos) 18%,transparent);color:var(--pos)}
.cp-item-last{font-size:12px;color:var(--ink-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cp-item-time{font-size:11px;color:var(--ink-3)}

.cp-detail{overflow-y:auto;padding:24px 32px;min-width:0}
.cp-detail-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.cp-detail-top h2{font-family:var(--font-disp);font-size:22px;font-weight:700;margin:0 0 6px}
.cp-detail-meta{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--ink-3);margin:0}
.cp-detail-actions{display:flex;gap:8px}
.cp-section{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px}
.cp-section h3{font-size:14px;font-weight:600;margin:0 0 12px;color:var(--ink)}
.cp-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px 24px}
.cp-grid label{display:block;font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.cp-grid > div > div{font-size:14px;color:var(--ink)}
.cp-timeline{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:12px;border-left:2px solid var(--line);padding-left:16px}
.cp-timeline li{position:relative}
.cp-timeline li::before{content:"";position:absolute;left:-21px;top:4px;width:10px;height:10px;background:var(--accent);border-radius:50%;border:2px solid var(--surface)}
.cp-timeline b{font-size:12px;color:var(--ink)}
.cp-timeline p{font-size:13px;color:var(--ink-2);margin:2px 0 0}
.cp-msgs{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.cp-msg{max-width:75%;background:var(--surface-2);padding:10px 14px;border-radius:12px}
.cp-msg.me{align-self:flex-end;background:var(--accent);color:var(--accent-ink)}
.cp-msg-who{font-size:11px;color:var(--ink-3);margin-bottom:2px}
.cp-msg.me .cp-msg-who{color:rgba(255,255,255,.75)}
.cp-msg p{margin:0;font-size:14px}
.cp-compose{display:flex;gap:8px}
