.cp-compose input{flex:1;padding:10px 14px;background:var(--surface-2);border:none;border-radius:999px;font-family:inherit;font-size:14px;color:var(--ink);outline:none}
.cp-attach{width:36px;height:36px;border-radius:50%;color:var(--ink-3);display:grid;place-items:center;flex-shrink:0}
.cp-attach:hover{background:var(--surface-2);color:var(--ink)}

/* V11 — full complaint flow */
.cp-prio{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;background:var(--neg);color:#fff;letter-spacing:.05em;text-transform:uppercase}
.cp-prio.big{font-size:11px;padding:3px 9px}
.cp-detail-id{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);letter-spacing:.08em;margin-bottom:4px}
.cp-prod{display:flex;align-items:center;gap:10px}
.cp-prod img{width:36px;height:36px;border-radius:var(--radius-sm);object-fit:cover;flex-shrink:0}
.cp-trust{color:var(--warn);font-size:12px;font-weight:600;margin-left:6px}
.cp-reason{margin-top:14px;padding-top:14px;border-top:1px dashed var(--line)}
.cp-reason label{font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px}
.cp-reason p{font-size:14px;line-height:1.6;color:var(--ink-2);margin:0}

/* Evidence gallery */
.cp-evid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.cp-evid-item{padding:0;border:1px solid var(--line);border-radius:var(--radius-sm);overflow:hidden;background:var(--surface);cursor:pointer;display:flex;flex-direction:column;gap:0;text-align:left;transition:.15s}
.cp-evid-item:hover{border-color:var(--accent);transform:translateY(-1px)}
.cp-evid-item img{width:100%;aspect-ratio:1/1;object-fit:cover}
.cp-evid-item span{padding:8px 10px;font-size:11px;color:var(--ink-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cp-evid-add{border:2px dashed var(--line-2);border-radius:var(--radius-sm);background:var(--surface);aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--ink-2);font-size:12px;cursor:pointer;transition:.15s}
.cp-evid-add:hover{border-color:var(--accent);color:var(--accent)}

/* Timeline actor/action */
.cp-timeline em{color:var(--accent);font-style:normal;font-weight:600}

/* Evidence Lightbox */
.cp-lb{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:400;display:flex;align-items:center;justify-content:center;padding:40px;animation:fadeIn .18s ease}
.cp-lb-close{position:absolute;top:20px;right:20px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);color:#fff;display:grid;place-items:center;backdrop-filter:blur(8px)}
.cp-lb-close:hover{background:rgba(255,255,255,.2)}
.cp-lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.1);color:#fff;display:grid;place-items:center;backdrop-filter:blur(8px)}
.cp-lb-nav:hover{background:rgba(255,255,255,.2)}
.cp-lb-nav.left{left:24px}
.cp-lb-nav.right{right:24px}
.cp-lb-body{max-width:100%;max-height:100%;display:flex;flex-direction:column;gap:14px;align-items:center}
.cp-lb-body img{max-width:90vw;max-height:78vh;object-fit:contain;border-radius:var(--radius);box-shadow:0 20px 60px rgba(0,0,0,.4)}
.cp-lb-cap{color:#fff;font-size:13px;display:flex;align-items:center;gap:12px}
.cp-lb-cap span{color:rgba(255,255,255,.5);font-family:var(--font-mono);font-size:11px}

/* Compose modal (new complaint) */
.cp-compose-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s ease}
.cp-compose-modal{background:var(--bg);border-radius:calc(var(--radius) + 6px);width:100%;max-width:640px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.35);animation:slideUp .22s cubic-bezier(.2,.8,.2,1)}
.cp-compose-head{padding:20px 24px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;background:var(--surface)}
.cp-compose-head h2{font-family:var(--font-disp);font-size:19px;font-weight:700;margin:0;letter-spacing:-.01em}
.cp-compose-close{width:32px;height:32px;border-radius:50%;color:var(--ink-3);display:grid;place-items:center}
.cp-compose-close:hover{background:var(--surface-2);color:var(--ink)}

.cp-steps{display:flex;gap:0;padding:16px 24px;background:var(--surface);border-bottom:1px solid var(--line)}
.cp-step{flex:1;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-3);position:relative}
.cp-step:not(:last-child)::after{content:"";flex:1;height:1.5px;background:var(--line);margin:0 8px}
.cp-step-n{width:22px;height:22px;border-radius:50%;background:var(--surface-2);display:grid;place-items:center;font-size:11px;font-weight:700;flex-shrink:0;color:var(--ink-3)}
.cp-step.on{color:var(--ink);font-weight:600}
.cp-step.on .cp-step-n{background:var(--accent);color:var(--accent-ink)}
.cp-step.done{color:var(--ink-2)}
.cp-step.done .cp-step-n{background:var(--pos);color:#fff}

.cp-compose-body{flex:1;overflow-y:auto;padding:24px;background:var(--bg)}
.cp-step-body{display:flex;flex-direction:column;gap:14px}
.cp-step-hint{font-size:13px;color:var(--ink-2);margin:0}

.cp-cats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.cp-cat{display:flex;align-items:center;gap:12px;padding:14px 16px;border:2px solid var(--line);border-radius:var(--radius);background:var(--surface);cursor:pointer;font-family:inherit;font-size:14px;text-align:left;color:var(--ink);transition:.15s}
.cp-cat:hover{border-color:var(--line-2)}
.cp-cat.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 6%,var(--surface))}
.cp-cat-ic{font-size:22px;flex-shrink:0}

.cp-orders{display:flex;flex-direction:column;gap:8px}
.cp-order{display:flex;align-items:center;gap:12px;padding:14px 16px;border:2px solid var(--line);border-radius:var(--radius);background:var(--surface);cursor:pointer;text-align:left;color:var(--ink);transition:.15s}
.cp-order:hover{border-color:var(--line-2)}
.cp-order.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 6%,var(--surface))}
.cp-order-main{flex:1;min-width:0}
.cp-order-t{font-weight:600;font-size:14px}
.cp-order-s{font-size:12px;color:var(--ink-3);margin-top:2px}
.cp-order-amt{font-family:var(--font-disp);font-weight:700;font-size:15px;flex-shrink:0}
.cp-manual{padding:12px;border:1px dashed var(--line-2);border-radius:var(--radius-sm);background:transparent;font-size:13px;color:var(--ink-2);cursor:pointer;font-family:inherit}
.cp-manual:hover{border-color:var(--accent);color:var(--accent)}

.cp-input,.cp-textarea{padding:12px 14px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--surface);font-family:inherit;font-size:14px;color:var(--ink);outline:none;transition:.15s}
.cp-input:focus,.cp-textarea:focus{border-color:var(--accent)}
.cp-textarea{resize:vertical;min-height:140px;line-height:1.6}
.cp-count{font-size:11px;color:var(--ink-3);font-family:var(--font-mono);text-align:right}

.cp-drop{border:2px dashed var(--line-2);border-radius:var(--radius);padding:36px 24px;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;background:var(--surface);cursor:pointer;transition:.15s;color:var(--ink-2)}
.cp-drop:hover{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 4%,var(--surface))}
.cp-drop-hint{font-size:11px;color:var(--ink-3);font-family:var(--font-mono)}
.cp-consent{padding:12px 14px;background:var(--surface-2);border-radius:var(--radius-sm);font-size:13px;color:var(--ink-2)}
.cp-consent label{display:flex;gap:10px;align-items:flex-start;line-height:1.5;cursor:pointer}
.cp-consent input{margin-top:2px;accent-color:var(--accent);flex-shrink:0}

.cp-compose-foot{padding:14px 24px;border-top:1px solid var(--line);display:flex;gap:10px;align-items:center;background:var(--surface)}

@media(max-width:600px){
  .cp-cats{grid-template-columns:1fr}
  .cp-compose-modal{max-height:100vh;border-radius:0;max-width:none}
  .cp-evid{grid-template-columns:repeat(2,1fr)}
  .cp-steps{padding:12px 14px}
  .cp-step:not(:last-child)::after{margin:0 4px}
  .cp-step span:not(.cp-step-n){display:none}
}

/* B6: Coins */
.co-balance{display:flex;align-items:center;gap:6px;padding:6px 14px;background:color-mix(in srgb,var(--warn) 12%,transparent);color:var(--warn);border-radius:999px;font-size:13px;font-weight:600}
.co-balance .co-ic{font-size:15px}
.co-tabs{display:flex;gap:4px;padding:14px 24px;border-bottom:1px solid var(--line);background:var(--surface)}
.co-tabs button{padding:8px 16px;border-radius:999px;font-size:13px;color:var(--ink-2);font-weight:500}
.co-tabs button.on{background:var(--ink);color:var(--bg)}
.co-body{flex:1;overflow-y:auto;padding:24px;max-width:1100px;margin:0 auto;width:100%}
.co-hero{text-align:center;margin-bottom:24px}
.co-hero h2{font-family:var(--font-disp);font-size:24px;font-weight:700;margin:0 0 6px}
.co-hero h2 b{color:var(--accent)}
.co-hero p{color:var(--ink-2);font-size:14px;margin:0}
.co-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.co-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px 16px;text-align:center;position:relative;display:flex;flex-direction:column;gap:8px;align-items:center}
.co-card.pop{border-color:var(--accent);box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 20%,transparent)}
.co-tag{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--accent-ink);padding:2px 10px;border-radius:999px;font-size:11px;font-weight:700}
.co-coins{font-family:var(--font-disp);font-size:22px;font-weight:700;color:var(--warn)}
.co-bonus{font-size:12px;color:var(--pos);font-weight:600}
.co-price{font-size:18px;font-weight:700;color:var(--ink);margin-top:auto}
.co-card .btn-primary{width:100%}

.co-prem-hero{background:linear-gradient(135deg,var(--ink) 0%,color-mix(in srgb,var(--ink) 70%,var(--accent)) 100%);color:#fff;border-radius:var(--radius);padding:32px;display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center;margin-bottom:20px}
.co-prem-hero h2{font-family:var(--font-disp);font-size:28px;font-weight:700;margin:0 0 8px}
.co-prem-hero p{color:rgba(255,255,255,.85);margin:0 0 16px;font-size:14px}
.co-price-row{display:flex;gap:20px;margin-bottom:16px}
.co-price-row > div{display:flex;align-items:baseline;gap:4px}
.co-price-row b{font-family:var(--font-disp);font-size:28px;font-weight:700}
.co-price-row span{font-size:13px;color:rgba(255,255,255,.7)}
.co-price-row em{font-style:normal;margin-left:8px;background:var(--pos);color:#fff;padding:1px 8px;border-radius:999px;font-size:11px;font-weight:600}
.co-prem-hero .btn-primary.lg{padding:12px 20px;font-size:15px;background:#fff;color:var(--ink)}
.co-prem-badge{font-family:var(--font-disp);font-size:32px;font-weight:800;padding:16px 20px;border:2px solid rgba(255,255,255,.3);border-radius:var(--radius);letter-spacing:.05em}
.co-perks{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.co-perk{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;display:flex;gap:14px}
.co-perk-ic{font-size:28px;flex-shrink:0}
.co-perk h4{margin:0 0 4px;font-size:14px;font-weight:600}
.co-perk p{margin:0;font-size:13px;color:var(--ink-2)}

.co-hist{display:flex;flex-direction:column;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.co-hist-row{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:var(--surface)}
.co-hist-t{font-size:14px;font-weight:600;color:var(--ink)}
.co-hist-s{font-size:12px;color:var(--ink-3)}
.co-hist-r{text-align:right}
.co-hist-n{font-family:var(--font-disp);font-size:15px;font-weight:700}
.co-hist-n:first-letter{color:var(--warn)}
.co-hist-a{font-size:11px;color:var(--ink-3)}

/* ==== V11 Coins — full flow ==== */
.co-tab-n{margin-left:6px;background:var(--accent);color:#fff;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:700}
.co-tabs button.on .co-tab-n{background:var(--accent-ink);color:var(--accent)}

/* Topup */
.co-coins-ic{color:var(--warn);margin-right:4px}
.co-perprice{font-size:11px;color:var(--ink-3);font-family:var(--font-mono)}
.co-buy{margin-top:6px}
.co-hint{display:flex;gap:8px;align-items:center;margin-top:18px;padding:12px 14px;background:var(--surface-2);border-radius:var(--radius-sm);font-size:12px;color:var(--ink-2)}
.co-hint svg{color:var(--ink-3);flex-shrink:0}

/* Active boosts */
.co-actives{display:flex;flex-direction:column;gap:12px}
.co-actives-head{margin-bottom:6px}
.co-actives-head h2{font-family:var(--font-disp);font-size:22px;font-weight:700;margin:0 0 4px}
.co-actives-head p{color:var(--ink-2);font-size:13px;margin:0}
.co-active{display:grid;grid-template-columns:90px 1fr auto;gap:16px;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;transition:.15s}
.co-active.featured{border-left:4px solid var(--warn)}
.co-active.boost{border-left:4px solid var(--accent)}
.co-active:hover{border-color:var(--line-2)}
.co-active-img{width:90px;height:90px;border-radius:var(--radius-sm);object-fit:cover}
.co-active-main{min-width:0}
.co-active-top{display:flex;gap:12px;align-items:center;margin-bottom:6px}
.co-active-top h3{font-family:var(--font-disp);font-size:15px;font-weight:700;margin:0;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.co-active-tag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:999px;letter-spacing:.04em;flex-shrink:0}
.co-active-tag.boost{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)}
.co-active-tag.featured{background:color-mix(in srgb,var(--warn) 15%,transparent);color:var(--warn)}
.co-active-meta{font-size:12px;color:var(--ink-2);margin-bottom:8px}
.co-active-meta b{color:var(--ink);font-family:var(--font-mono)}
.co-active-bar{height:6px;background:var(--surface-2);border-radius:999px;overflow:hidden;margin-bottom:10px}
.co-active-fill{height:100%;background:linear-gradient(90deg,var(--accent),color-mix(in srgb,var(--accent) 60%,var(--pos)));border-radius:999px;transition:width .3s}
.co-active-stats{display:flex;gap:18px}
.co-active-stats > div{display:flex;flex-direction:column;gap:1px}
.co-active-stats b{font-family:var(--font-disp);font-size:15px;font-weight:700;color:var(--ink)}
.co-active-stats span{font-size:11px;color:var(--ink-3)}
.co-active-actions{display:flex;flex-direction:column;gap:6px}
.co-active-add{display:flex;gap:10px;align-items:center;justify-content:center;padding:14px;border:2px dashed var(--line-2);border-radius:var(--radius);background:transparent;color:var(--ink-2);font-size:14px;font-family:inherit;cursor:pointer;transition:.15s}
.co-active-add:hover{border-color:var(--accent);color:var(--accent)}

/* Premium redesign */
.co-prem-hero{grid-template-columns:1.2fr 1fr}
.co-prem-left{display:flex;flex-direction:column;align-items:flex-start}
.co-prem-eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;color:rgba(255,255,255,.7);margin-bottom:8px;display:inline-block;background:rgba(255,255,255,.1);padding:3px 10px;border-radius:999px}
.co-plan-toggle{display:flex;gap:4px;padding:3px;background:rgba(255,255,255,.1);border-radius:999px;margin-bottom:20px}
.co-plan-toggle button{padding:8px 16px;border-radius:999px;color:rgba(255,255,255,.7);font-size:13px;font-weight:500;font-family:inherit}
.co-plan-toggle button.on{background:#fff;color:var(--ink)}
.co-save{background:var(--pos);color:#fff;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:700;margin-left:4px}
.co-plan-toggle button.on .co-save{background:var(--pos);color:#fff}
.co-price-display{margin-bottom:20px}
.co-price-amt{font-family:var(--font-disp);font-size:44px;font-weight:800;letter-spacing:-.02em}
.co-price-per{font-size:16px;color:rgba(255,255,255,.7);margin-left:6px}
.co-price-sub{font-size:12px;color:rgba(255,255,255,.65);margin-top:6px;font-family:var(--font-mono)}
.co-prem-cta{background:#fff !important;color:var(--ink) !important}
.co-prem-fine{font-size:11px;color:rgba(255,255,255,.6);margin-top:10px;font-family:var(--font-mono)}

.co-prem-right{display:flex;align-items:center;justify-content:center}
.co-prem-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:var(--radius);padding:20px;width:100%;backdrop-filter:blur(8px)}
.co-prem-card-top{display:flex;gap:12px;align-items:center;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,.15)}
.co-prem-ava{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#fff,rgba(255,255,255,.6));color:var(--ink);display:grid;place-items:center;font-weight:700;font-size:14px;flex-shrink:0}
.co-prem-name{font-weight:600;font-size:15px;display:flex;align-items:center;gap:8px;color:#fff}
.co-prem-star{font-size:11px;font-weight:700;background:linear-gradient(90deg,#f59e0b,#fbbf24);color:#fff;padding:2px 8px;border-radius:999px;letter-spacing:.04em}
.co-prem-meta{font-size:11px;color:rgba(255,255,255,.7);margin-top:2px}
.co-prem-stat{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.co-prem-stat > div{display:flex;flex-direction:column;gap:2px}
.co-prem-stat b{font-family:var(--font-disp);font-size:22px;font-weight:800;color:#fff;letter-spacing:-.01em}
.co-prem-stat span{font-size:10px;color:rgba(255,255,255,.65);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.04em}

.co-perks-h{font-family:var(--font-disp);font-size:18px;font-weight:700;margin:24px 0 14px;color:var(--ink)}
.co-perk{position:relative}
.co-perk.live{border-color:var(--pos);background:color-mix(in srgb,var(--pos) 4%,var(--surface))}
.co-perk-body{flex:1;min-width:0}
.co-perk-tag{display:inline-block;margin-top:6px;font-size:10px;font-weight:700;background:var(--pos);color:#fff;padding:2px 8px;border-radius:999px;letter-spacing:.04em;text-transform:uppercase}

.co-prem-faq{margin-top:28px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px 24px}
.co-prem-faq h3{font-family:var(--font-disp);font-size:16px;font-weight:700;margin:0 0 12px}
.co-prem-faq details{border-bottom:1px solid var(--line);padding:12px 0}
.co-prem-faq details:last-child{border-bottom:none}
.co-prem-faq summary{cursor:pointer;font-size:14px;font-weight:500;color:var(--ink);list-style:none;padding-right:20px;position:relative}
.co-prem-faq summary::-webkit-details-marker{display:none}
.co-prem-faq summary::after{content:'+';position:absolute;right:0;top:50%;transform:translateY(-50%);color:var(--ink-3);font-size:18px;font-weight:400}
.co-prem-faq details[open] summary::after{content:'−'}
.co-prem-faq details p{margin:10px 0 0;font-size:13px;color:var(--ink-2);line-height:1.6}

/* History redesign */
.co-hist-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.co-hist-head h2{font-family:var(--font-disp);font-size:22px;font-weight:700;margin:0}
.co-hist-filters{display:flex;gap:8px}
.co-hist-filters select{padding:6px 10px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--surface);font-family:inherit;font-size:13px;color:var(--ink)}
.co-hist-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.co-hist-summary > div{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px 18px;display:flex;flex-direction:column;gap:2px}
.co-hist-summary b{font-family:var(--font-disp);font-size:22px;font-weight:700;letter-spacing:-.01em}
.co-hist-summary span{font-size:11px;color:var(--ink-3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.04em}
.co-hist-summary > div:nth-child(1) b{color:var(--pos)}
.co-hist-summary > div:nth-child(2) b{color:var(--neg)}
.co-hist-row{gap:12px}
.co-hist-ic{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;flex-shrink:0}
.co-hist-ic.pos{background:color-mix(in srgb,var(--pos) 15%,transparent);color:var(--pos)}
.co-hist-ic.neg{background:color-mix(in srgb,var(--neg) 15%,transparent);color:var(--neg)}
.co-hist-main{flex:1;min-width:0}
.co-hist-method{color:var(--ink-3)}
.co-hist-n.pos{color:var(--pos)}
.co-hist-n.neg{color:var(--neg)}

/* Checkout modal */
.co-ck-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s ease}
.co-ck{background:var(--bg);border-radius:calc(var(--radius) + 6px);width:100%;max-width:520px;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.35);animation:slideUp .22s cubic-bezier(.2,.8,.2,1)}
.co-ck-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;background:var(--surface)}
.co-ck-head h2{font-family:var(--font-disp);font-size:17px;font-weight:700;margin:0;letter-spacing:-.01em}
.co-ck-close{width:30px;height:30px;border-radius:50%;color:var(--ink-3);display:grid;place-items:center}
.co-ck-close:hover{background:var(--surface-2);color:var(--ink)}

.co-ck-body{flex:1;overflow-y:auto;padding:22px;background:var(--bg);display:flex;flex-direction:column;gap:18px}
.co-ck-item{display:flex;gap:14px;align-items:center;padding:16px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius)}
.co-ck-item-ic{width:48px;height:48px;border-radius:var(--radius);background:linear-gradient(135deg,var(--warn),color-mix(in srgb,var(--warn) 60%,#000));color:#fff;display:grid;place-items:center;font-size:22px;flex-shrink:0}
.co-ck-item-main{flex:1;min-width:0}
.co-ck-item-t{font-weight:600;font-size:15px}
.co-ck-item-s{font-size:12px;color:var(--ink-3);margin-top:2px}
.co-ck-item-p{font-family:var(--font-disp);font-size:22px;font-weight:800;letter-spacing:-.01em}

.co-ck-sec{display:flex;flex-direction:column;gap:8px}
.co-ck-sec h3{font-size:12px;font-weight:700;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;margin:0 0 4px}
.co-pay{display:flex;gap:12px;align-items:center;padding:12px 14px;border:1.5px solid var(--line);border-radius:var(--radius-sm);background:var(--surface);cursor:pointer;text-align:left;font-family:inherit;transition:.15s;color:var(--ink)}
.co-pay:hover{border-color:var(--line-2)}
.co-pay.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 5%,var(--surface))}
.co-pay-ic{width:38px;height:28px;border-radius:4px;background:var(--surface-2);color:var(--ink-2);display:grid;place-items:center;font-size:11px;font-weight:700;font-family:var(--font-mono);flex-shrink:0}
.co-pay-main{flex:1}
.co-pay-nm{font-weight:500;font-size:13.5px}
.co-pay-s{font-size:11px;color:var(--ink-3);margin-top:1px}
.co-pay-radio{width:18px;height:18px;border-radius:50%;border:2px solid var(--line-2);flex-shrink:0;transition:.15s;position:relative}
.co-pay-radio.on{border-color:var(--accent)}
.co-pay-radio.on::after{content:'';position:absolute;inset:3px;border-radius:50%;background:var(--accent)}

.co-ck-sum{background:var(--surface-2);border-radius:var(--radius-sm);padding:14px 16px;display:flex;flex-direction:column;gap:6px}
.co-ck-sum-r{display:flex;justify-content:space-between;font-size:13px;color:var(--ink-2)}
.co-ck-sum-r b{color:var(--ink);font-weight:600}
.co-ck-sum-r.pos b{color:var(--pos)}
.co-ck-sum-r.total{padding-top:10px;border-top:1px dashed var(--line-2);margin-top:4px;font-size:15px;color:var(--ink);font-weight:600}
.co-ck-sum-r.total b{font-family:var(--font-disp);font-size:17px;font-weight:800}
.co-ck-sum-note{font-size:11px;color:var(--ink-3);margin-top:6px;padding-top:6px;border-top:1px dashed var(--line-2);line-height:1.5}

.co-ck-consent{display:flex;gap:10px;align-items:flex-start;font-size:12px;color:var(--ink-2);line-height:1.5;cursor:pointer}
.co-ck-consent input{margin-top:2px;accent-color:var(--accent);flex-shrink:0}
.co-ck-consent a{color:var(--accent);text-decoration:underline;cursor:pointer}

.co-ck-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:10px;align-items:center;justify-content:space-between;background:var(--surface)}
.co-ck-foot .btn-primary{flex:1}
.co-ck-foot .btn-ghost{flex-shrink:0}

/* Paying state */
.co-ck-paying{padding:60px 30px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px}
.co-spinner{width:48px;height:48px;border:3px solid var(--surface-2);border-top-color:var(--accent);border-radius:50%;animation:coSpin 1s linear infinite}
@keyframes coSpin{to{transform:rotate(360deg)}}
.co-ck-paying h3{font-family:var(--font-disp);font-size:18px;font-weight:700;margin:0}
.co-ck-paying p{font-size:13px;color:var(--ink-2);margin:0}

/* Success state */
.co-ck-success{padding:36px 30px 24px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px}
.co-check-ic{width:72px;height:72px;border-radius:50%;background:color-mix(in srgb,var(--pos) 15%,transparent);color:var(--pos);display:grid;place-items:center;animation:checkPop .4s cubic-bezier(.2,.8,.2,1)}
@keyframes checkPop{0%{transform:scale(.3);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.co-ck-success h3{font-family:var(--font-disp);font-size:22px;font-weight:800;margin:0;letter-spacing:-.01em}
.co-ck-success p{font-size:14px;color:var(--ink-2);margin:0 0 8px;line-height:1.5}
.co-ck-rcpt{background:var(--surface-2);border-radius:var(--radius-sm);padding:14px 18px;width:100%;display:flex;flex-direction:column;gap:6px;margin-top:8px}
.co-ck-rcpt > div{display:flex;justify-content:space-between;font-size:13px}
.co-ck-rcpt span{color:var(--ink-3)}
.co-ck-rcpt b{color:var(--ink);font-family:var(--font-mono);font-weight:600}

.btn-ghost.sm{padding:5px 10px;font-size:12px}

@media(max-width:700px){
  .co-active{grid-template-columns:60px 1fr;gap:12px}
  .co-active-img{width:60px;height:60px}
  .co-active-actions{grid-column:1/-1;flex-direction:row}
  .co-active-stats{gap:12px;flex-wrap:wrap}
  .co-prem-hero{grid-template-columns:1fr}
  .co-prem-right{display:none}
  .co-hist-summary{grid-template-columns:1fr}
  .co-ck{max-width:none;border-radius:0;max-height:100vh}
}

/* ============= B7: Admin (Ops Console, v2) ============= */
.ad{flex:1;display:grid;grid-template-columns:210px 1fr;min-height:0;overflow:hidden}
.ad-side{background:#0b1426;color:#fff;padding:14px 10px;display:flex;flex-direction:column;gap:6px;border-right:1px solid rgba(255,255,255,.06)}
.ad-brand{display:flex;align-items:center;gap:8px;padding:0 6px 12px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:6px}
.ad-brand-sub{font-size:10px;font-weight:700;letter-spacing:.15em;color:rgba(255,255,255,.6);margin-left:auto}
.ad-nav{display:flex;flex-direction:column;gap:2px;flex:1}
.ad-nav button{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);font-size:13px;color:rgba(255,255,255,.75);text-align:left}
.ad-nav button:hover{background:rgba(255,255,255,.08);color:#fff}
.ad-nav button.on{background:var(--accent);color:var(--accent-ink);font-weight:600}
.ad-ic{width:20px;display:inline-flex;justify-content:center;font-size:15px}
.ad-close{padding:10px 12px;border-radius:var(--radius-sm);font-size:12px;color:rgba(255,255,255,.6);text-align:left}
.ad-close:hover{background:rgba(255,255,255,.08);color:#fff}
.ad-main{overflow-y:auto;padding:24px 32px;background:var(--bg)}
.ad-top{display:flex;align-items:center;gap:14px;margin-bottom:22px;flex-wrap:wrap}
.ad-top h1{flex:1;font-family:var(--font-disp);font-size:24px;font-weight:700;margin:0;min-width:160px}
.ad-top-r{display:flex;gap:8px;align-items:center}
.ad-search{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);width:240px}
.ad-search input{background:transparent;border:none;outline:none;font-family:inherit;font-size:13px;flex:1;color:var(--ink)}
.ad-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:22px}
.ad-kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px}
.ad-kpi-l{font-size:12px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px}
.ad-kpi-v{font-family:var(--font-disp);font-size:26px;font-weight:700;margin-bottom:4px}
.ad-kpi-d{font-size:12px}
.ad-kpi-d.pos{color:var(--pos)}
.ad-kpi-d.neg{color:var(--neg)}
.ad-row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ad-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px}
.ad-card h3{margin:0 0 14px;font-size:14px;font-weight:600}
.ad-feed{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:10px}
.ad-feed li{display:flex;gap:6px;font-size:13px;color:var(--ink-2);flex-wrap:wrap}
.ad-feed li b{color:var(--ink)}
.ad-feed li i{color:var(--accent);font-style:normal}
.ad-feed li span{margin-left:auto;font-size:11px;color:var(--ink-3)}
.ad-chart{display:flex;align-items:flex-end;gap:3px;height:140px;padding:8px 0}
.ad-bar{flex:1;background:linear-gradient(to top,var(--accent),color-mix(in srgb,var(--accent) 60%,transparent));border-radius:3px 3px 0 0;min-height:4px}
.ad-chart-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-3);margin-top:6px}

.ad-table-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.ad-table{width:100%;border-collapse:collapse;font-size:13px}
.ad-table th{text-align:left;padding:12px 14px;background:var(--surface-2);font-weight:600;color:var(--ink-2);font-size:12px;border-bottom:1px solid var(--line)}
.ad-table td{padding:12px 14px;border-bottom:1px solid var(--line);color:var(--ink)}
.ad-table tr:last-child td{border-bottom:none}
.ad-table tr:hover td{background:var(--surface-2)}

/* ==== V11 Admin — full flow ==== */
.ad-admin-card{display:flex;gap:10px;align-items:center;padding:10px 8px;margin-top:8px;border-top:1px solid rgba(255,255,255,.1);padding-top:14px}
.ad-admin-ava{width:32px;height:32px;border-radius:50%;background:var(--accent);color:var(--accent-ink);display:grid;place-items:center;font-weight:700;font-size:12px;flex-shrink:0}
.ad-admin-name{font-size:13px;font-weight:600;color:#fff}
.ad-admin-role{font-size:10px;color:rgba(255,255,255,.5);font-family:var(--font-mono);letter-spacing:.05em;text-transform:uppercase}
.ad-nav-n{margin-left:auto;background:var(--neg);color:#fff;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:700}

.ad-breadcrumb{font-size:11px;color:var(--ink-3);font-family:var(--font-mono);letter-spacing:.04em;margin-top:2px}
.ad-top-r{display:flex;gap:8px;align-items:center;margin-left:auto}
.ad-bell{position:relative;padding:7px}
.ad-bell-dot{position:absolute;top:5px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--neg);border:1.5px solid var(--surface)}

.ad-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.ad-card-head h3{margin:0}
.ad-card-badge{background:var(--neg);color:#fff;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:700}
.ad-card-delta.pos{color:var(--pos);font-size:12px;font-weight:600}

.ad-pending{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:2px}
.ad-pending-row{display:flex;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}
.ad-pending-row:last-child{border-bottom:none}
.ad-pending-prio{font-size:10px;font-weight:700;padding:3px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
.ad-pending-prio.high{background:var(--neg);color:#fff}
.ad-pending-prio.mid{background:var(--warn);color:#fff}
.ad-pending-prio.low{background:var(--surface-2);color:var(--ink-2)}
.ad-pending-main{flex:1;min-width:0}
.ad-pending-subj{font-size:13.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ad-pending-meta{font-size:11px;color:var(--ink-3);font-family:var(--font-mono);margin-top:2px}

/* Filters + table */
.ad-filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.ad-filters button{padding:6px 14px;border-radius:999px;font-size:12px;color:var(--ink-2);background:var(--surface);border:1px solid var(--line);font-family:inherit;cursor:pointer;transition:.15s}
.ad-filters button:hover{border-color:var(--line-2)}
.ad-filters button.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}

.ad-user-cell{display:flex;align-items:center;gap:10px}
.ad-user-ava{width:32px;height:32px;border-radius:50%;background:var(--surface-2);color:var(--ink);display:grid;place-items:center;font-weight:600;font-size:11px;flex-shrink:0}
.ad-user-id{font-size:11px;color:var(--ink-3);font-family:var(--font-mono);margin-top:1px}
.ad-listing-cell{display:flex;align-items:center;gap:10px}
.ad-listing-cell img{width:40px;height:40px;border-radius:var(--radius-sm);object-fit:cover;flex-shrink:0}
.ad-mono{font-family:var(--font-mono);font-size:12.5px}

.ad-status-tag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:3px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;display:inline-block}
.ad-status-tag.active,.ad-status-tag.success{background:color-mix(in srgb,var(--pos) 15%,transparent);color:var(--pos)}
.ad-status-tag.premium{background:linear-gradient(90deg,#f59e0b,#fbbf24);color:#fff}
.ad-status-tag.pending,.ad-status-tag.investigating,.ad-status-tag.new{background:color-mix(in srgb,var(--warn) 15%,transparent);color:var(--warn)}
.ad-status-tag.suspended,.ad-status-tag.reported,.ad-status-tag.refunded{background:color-mix(in srgb,var(--neg) 15%,transparent);color:var(--neg)}
.ad-status-tag.resolved{background:var(--surface-2);color:var(--ink-3)}

.ad-premium-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;background:linear-gradient(90deg,#f59e0b,#fbbf24);color:#fff;letter-spacing:.04em}
.ad-boost-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent);letter-spacing:.04em}
.ad-report-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;background:var(--neg);color:#fff}
.ad-trust{color:var(--warn);font-weight:600;font-family:var(--font-mono);font-size:12.5px}
.ad-evidence-tag{font-size:10px;color:var(--ink-2);background:var(--surface-2);padding:2px 8px;border-radius:999px}

/* Drawer */
.ad-drawer-bd{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:350;animation:fadeIn .15s ease}
.ad-drawer{position:fixed;top:0;right:0;bottom:0;width:100%;max-width:480px;background:var(--bg);display:flex;flex-direction:column;box-shadow:-20px 0 60px rgba(0,0,0,.2);animation:slideInR .25s cubic-bezier(.2,.8,.2,1)}
@keyframes slideInR{from{transform:translateX(100%)}to{transform:translateX(0)}}
.ad-drawer-top{padding:16px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;background:var(--surface)}
.ad-drawer-top h2{font-family:var(--font-disp);font-size:17px;font-weight:700;margin:0;flex:1}
.ad-drawer-close{width:32px;height:32px;border-radius:50%;color:var(--ink-3);display:grid;place-items:center;background:transparent;border:none;cursor:pointer}
.ad-drawer-close:hover{background:var(--surface-2);color:var(--ink)}
.ad-drawer-body{flex:1;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:20px}

.ad-dr-hero{display:flex;gap:14px;align-items:center}
.ad-dr-ava{width:56px;height:56px;border-radius:50%;background:var(--surface-2);color:var(--ink);display:grid;place-items:center;font-weight:700;font-size:17px;flex-shrink:0}
.ad-dr-hero-main{flex:1;min-width:0}
.ad-dr-hero-main h3{font-family:var(--font-disp);font-size:18px;font-weight:700;margin:0 0 3px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ad-dr-hero-meta{font-size:12px;color:var(--ink-3);font-family:var(--font-mono)}
.ad-dr-hero-status{margin-top:6px;font-size:12px;color:var(--ink-2);display:flex;gap:8px;align-items:center}

.ad-dr-alert{padding:12px 14px;border-radius:var(--radius-sm);font-size:13px;line-height:1.5}
.ad-dr-alert.neg{background:color-mix(in srgb,var(--neg) 8%,transparent);border:1px solid color-mix(in srgb,var(--neg) 25%,transparent);color:var(--ink)}
.ad-dr-alert.pos{background:color-mix(in srgb,var(--pos) 8%,transparent);border:1px solid color-mix(in srgb,var(--pos) 25%,transparent);color:var(--ink)}

.ad-dr-section h4{font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin:0 0 10px}
.ad-dr-kv{display:grid;grid-template-columns:1fr 1fr;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px}
.ad-dr-kv > div{display:flex;flex-direction:column;gap:2px}
.ad-dr-kv span{font-size:11px;color:var(--ink-3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.04em}
.ad-dr-kv b{font-weight:500;font-size:13.5px;color:var(--ink)}

.ad-dr-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ad-dr-stats > div{display:flex;flex-direction:column;gap:2px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 14px}
.ad-dr-stats b{font-family:var(--font-disp);font-size:19px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
.ad-dr-stats span{font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em}

.ad-dr-timeline{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px;font-size:13px;color:var(--ink-2);line-height:1.5}
.ad-dr-timeline b{color:var(--ink-3);font-weight:600;font-family:var(--font-mono);font-size:11px;margin-right:8px}

.ad-dr-actions{display:flex;gap:8px;padding-top:16px;border-top:1px solid var(--line);margin-top:auto;flex-wrap:wrap}
.ad-dr-actions .btn-primary{flex:1;min-width:140px}
.ad-dr-actions .btn-primary:disabled{opacity:.5;cursor:not-allowed}

.ad-dr-listing-img{width:100%;aspect-ratio:16/10;object-fit:cover;border-radius:var(--radius);margin-bottom:4px}

.ad-activity-ic{width:22px;height:22px;border-radius:50%;background:var(--surface-2);display:grid;place-items:center;flex-shrink:0;margin-top:1px;color:var(--ink-2)}
.ad-activity-ic svg{width:11px;height:11px}
.ad-activity-ic.pos{background:color-mix(in srgb,var(--pos) 15%,transparent);color:var(--pos)}
.ad-activity-ic.neg{background:color-mix(in srgb,var(--neg) 15%,transparent);color:var(--neg)}
.ad-activity-ic.warn{background:color-mix(in srgb,var(--warn) 15%,transparent);color:var(--warn)}
.ad-activity-ic.acc{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)}
.ad-activity-main{flex:1;min-width:0;color:var(--ink-2)}
.ad-activity-main b{color:var(--ink);font-weight:600}
.ad-activity-time{font-family:var(--font-mono);font-size:10px;color:var(--ink-3);white-space:nowrap;flex-shrink:0}

/* Command palette */
.ad-cmdk-bd{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:400;display:flex;justify-content:center;align-items:flex-start;padding-top:100px}
.ad-cmdk-box{width:100%;max-width:560px;background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;display:flex;flex-direction:column;max-height:60vh}
.ad-cmdk-inp{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line)}
.ad-cmdk-inp svg{color:var(--ink-3);flex-shrink:0}
.ad-cmdk-inp input{flex:1;background:transparent;border:none;outline:none;font-family:inherit;font-size:15px;color:var(--ink)}
.ad-cmdk-inp input::placeholder{color:var(--ink-3)}
.ad-cmdk-inp kbd{font-family:var(--font-mono);font-size:10px;padding:2px 6px;border-radius:3px;background:var(--surface-2);border:1px solid var(--line);color:var(--ink-3)}
.ad-cmdk-list{flex:1;overflow-y:auto;padding:8px 0}
.ad-cmdk-group-lbl{font-family:var(--font-mono);font-size:10px;color:var(--ink-3);padding:8px 18px 4px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.ad-cmdk-item{display:flex;align-items:center;gap:12px;padding:8px 18px;cursor:pointer;font-size:13px;color:var(--ink)}
.ad-cmdk-item:hover,.ad-cmdk-item.on{background:color-mix(in srgb,var(--accent) 8%,transparent)}
.ad-cmdk-item .ic{width:20px;height:20px;border-radius:4px;background:var(--surface-2);display:grid;place-items:center;color:var(--ink-2);flex-shrink:0}
.ad-cmdk-item .main{flex:1;min-width:0}
.ad-cmdk-item .sub{font-size:11px;color:var(--ink-3);font-family:var(--font-mono)}
.ad-cmdk-item .arr{color:var(--ink-3);font-size:11px;font-family:var(--font-mono)}

/* Detail pane blocks */
.ad-dp-sec{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:16px}
.ad-dp-sec h4{font-family:var(--font-mono);font-size:10px;font-weight:600;color:var(--ink-3);margin:0 0 10px;letter-spacing:.08em;text-transform:uppercase}
.ad-dp-kv{display:grid;grid-template-columns:repeat(2,1fr);gap:10px 18px}
.ad-dp-kv > div{display:flex;flex-direction:column;gap:2px;min-width:0}
.ad-dp-kv .k{font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em;font-family:var(--font-mono);font-weight:600}
.ad-dp-kv .v{font-size:13.5px;color:var(--ink);font-weight:500;line-height:1.35}
.ad-dp-kv .v.mono{font-family:var(--font-mono);font-size:12.5px}

.ad-dp-actions{display:flex;gap:8px;padding:14px 24px;border-top:1px solid var(--line);background:var(--surface);position:sticky;bottom:0;flex-wrap:wrap}
.ad-dp-actions .spacer{flex:1}
.ad-dp-actions .btn-grad{background:var(--accent);color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.ad-dp-actions .btn-grad:hover{filter:brightness(1.08)}
.ad-dp-actions .btn-sec{background:var(--surface);color:var(--ink);border:1px solid var(--line);padding:8px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.ad-dp-actions .btn-sec:hover{border-color:var(--line-2);background:var(--surface-2)}
.ad-dp-actions .btn-sec.danger{color:var(--neg);border-color:color-mix(in srgb,var(--neg) 30%,var(--line))}
.ad-dp-actions .btn-sec.danger:hover{background:color-mix(in srgb,var(--neg) 8%,transparent)}

.ad-dp-hero{display:flex;gap:14px;align-items:center;padding:18px;background:var(--surface);border:1px solid var(--line);border-radius:10px}
.ad-dp-hero img{width:76px;height:76px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--surface-2)}
.ad-dp-hero .main{flex:1;min-width:0}
.ad-dp-hero .main h3{font-family:var(--font-disp);font-size:17px;font-weight:700;margin:0 0 4px}
.ad-dp-hero .main .meta{font-size:12px;color:var(--ink-3);font-family:var(--font-mono)}
.ad-dp-hero .price{font-family:var(--font-disp);font-size:22px;font-weight:700;color:var(--accent);letter-spacing:-.01em;flex-shrink:0}

.ad-dp-sla{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:8px;background:color-mix(in srgb,var(--warn) 8%,var(--surface));border:1px solid color-mix(in srgb,var(--warn) 25%,var(--line));color:var(--ink);font-size:13px}
.ad-dp-sla.neg{background:color-mix(in srgb,var(--neg) 8%,var(--surface));border-color:color-mix(in srgb,var(--neg) 30%,var(--line))}
.ad-dp-sla-ic{width:24px;height:24px;border-radius:50%;background:var(--warn);color:#fff;display:grid;place-items:center;flex-shrink:0}
.ad-dp-sla.neg .ad-dp-sla-ic{background:var(--neg)}
.ad-dp-sla b{font-weight:700;font-family:var(--font-mono)}

.ad-dp-evidence{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.ad-dp-ev-item{aspect-ratio:1/1;background:var(--surface-2);border:1px solid var(--line);border-radius:6px;display:grid;place-items:center;color:var(--ink-3);font-size:11px;cursor:pointer;gap:6px;flex-direction:column;display:flex;align-items:center;justify-content:center}
.ad-dp-ev-item:hover{border-color:var(--accent);color:var(--accent)}

.ad-dp-time{display:flex;flex-direction:column;gap:0;padding:0}
.ad-dp-time-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px dashed var(--line);font-size:13px;color:var(--ink-2);align-items:flex-start}
.ad-dp-time-item:last-child{border-bottom:none}
.ad-dp-time-dot{width:8px;height:8px;border-radius:50%;background:var(--ink-3);flex-shrink:0;margin-top:5px;position:relative}
.ad-dp-time-dot.acc{background:var(--accent)}
.ad-dp-time-dot.pos{background:var(--pos)}
.ad-dp-time-main{flex:1;min-width:0}
.ad-dp-time-main b{color:var(--ink);font-weight:600}
.ad-dp-time-t{font-family:var(--font-mono);font-size:10px;color:var(--ink-3);white-space:nowrap;flex-shrink:0}

.ad-dp-compose{display:flex;flex-direction:column;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:12px}
.ad-dp-compose textarea{width:100%;min-height:70px;resize:vertical;border:1px solid var(--line);border-radius:6px;padding:10px;font-family:inherit;font-size:13px;outline:none;color:var(--ink);background:var(--surface);line-height:1.5}
.ad-dp-compose textarea:focus{border-color:var(--accent)}
.ad-dp-compose-row{display:flex;align-items:center;gap:8px}
.ad-dp-compose-row .spacer{flex:1}

.ad-dp-decision{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.ad-dp-dec{display:flex;flex-direction:column;gap:4px;padding:12px;border-radius:6px;border:1.5px solid var(--line);background:var(--surface);cursor:pointer;text-align:left;font-family:inherit;transition:.1s;color:var(--ink)}
.ad-dp-dec:hover{border-color:var(--line-2)}
.ad-dp-dec.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 5%,var(--surface))}
.ad-dp-dec.on.warn{border-color:var(--warn);background:color-mix(in srgb,var(--warn) 5%,var(--surface))}
.ad-dp-dec.on.neg{border-color:var(--neg);background:color-mix(in srgb,var(--neg) 5%,var(--surface))}
.ad-dp-dec-t{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.ad-dp-dec-t .ic{width:20px;height:20px;border-radius:4px;display:grid;place-items:center;background:var(--surface-2);color:var(--ink-2)}
.ad-dp-dec.on .ic{background:var(--accent);color:#fff}
.ad-dp-dec.on.warn .ic{background:var(--warn);color:#fff}
.ad-dp-dec.on.neg .ic{background:var(--neg);color:#fff}
.ad-dp-dec-d{font-size:11px;color:var(--ink-3);line-height:1.4}

.ad-dp-refund-opts{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:8px}
.ad-dp-refund-opts button{padding:10px;border:1.5px solid var(--line);border-radius:6px;background:var(--surface);font-family:var(--font-disp);font-weight:700;font-size:14px;color:var(--ink);cursor:pointer;transition:.1s}
.ad-dp-refund-opts button.on{border-color:var(--accent);background:var(--accent);color:#fff}

/* Activity drawer */
.ad-act-drawer{position:fixed;top:0;right:0;bottom:0;width:340px;background:var(--surface);border-left:1px solid var(--line);box-shadow:-10px 0 40px rgba(0,0,0,.1);z-index:200;display:flex;flex-direction:column;animation:slideInR .25s ease}

/* Small tweaks */
.ad-id-mono{font-family:var(--font-mono);font-size:11.5px;color:var(--ink-3);font-weight:600}

@media(max-width:1100px){
  .ad-queue{grid-template-columns:340px 1fr}
  .ad-home-hero{grid-template-columns:repeat(2,1fr)}
  .ad-home-grid{grid-template-columns:1fr}
  .ad-metric-chips{display:none}
}
@media(max-width:800px){
  .ad{grid-template-columns:1fr}
  .ad-side{display:none}
  .ad-queue{grid-template-columns:1fr}
  .ad-q-detail{display:none}
  .ad-q-detail.show{display:block;position:fixed;inset:0;z-index:150;background:var(--bg)}
}
.btn-ghost{padding:6px 12px;background:transparent;border:1px solid var(--line);border-radius:var(--radius-sm);font-size:12px;font-weight:500;color:var(--ink-2);cursor:pointer}
.btn-ghost:hover{background:var(--surface-2);color:var(--ink)}
.btn-ghost.sm{padding:4px 10px;font-size:11px}

@media(max-width:900px){
  .cp{grid-template-columns:1fr}
  .cp-list{max-height:40vh}
  .ad{grid-template-columns:1fr}
  .ad-side{flex-direction:row;overflow-x:auto;padding:10px}
  .ad-nav{flex-direction:row}
  .ad-row-2{grid-template-columns:1fr}
  .co-prem-hero{grid-template-columns:1fr}
}

/* =========== FOOTER =========== */
.v2-footer{margin-top:80px;border-top:1px solid var(--line);background:var(--surface)}
.v2-footer-in{max-width:1440px;margin:0 auto;padding:56px 20px 40px;display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr 1fr;gap:48px}
.v2-ft-brand{display:flex;flex-direction:column;gap:16px;max-width:320px}
.v2-ft-tag{font-size:13px;color:var(--ink-2);line-height:1.6;margin:0}
.v2-ft-apps{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
.v2-ft-app{display:flex;align-items:center;gap:10px;padding:9px 14px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--bg);color:var(--ink);text-align:left}
.v2-ft-app:hover{background:var(--surface-2);border-color:var(--ink-3)}
.v2-ft-app small{display:block;font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em;line-height:1}
.v2-ft-app b{display:block;font-size:13px;font-weight:600;line-height:1.2;margin-top:2px}
.v2-ft-col h4{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink);margin:0 0 14px;font-weight:600}
.v2-ft-col ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:9px}
.v2-ft-col li a{font-size:13px;color:var(--ink-2);text-decoration:none;cursor:pointer}
.v2-ft-col li a:hover{color:var(--accent);text-decoration:underline}
.v2-ft-bot{border-top:1px solid var(--line);background:var(--bg)}
.v2-ft-bot-in{max-width:1440px;margin:0 auto;padding:18px 20px;display:flex;gap:20px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.v2-ft-social{display:flex;gap:8px}
.v2-ft-s{width:34px;height:34px;display:grid;place-items:center;border-radius:50%;border:1px solid var(--line);color:var(--ink-2);background:var(--surface)}
.v2-ft-s:hover{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.v2-ft-trust{display:flex;gap:8px;flex-wrap:wrap}
.v2-ft-badge{font-size:11px;color:var(--ink-3);padding:5px 10px;border:1px solid var(--line);border-radius:999px;background:var(--surface);white-space:nowrap}
.v2-ft-legal{border-top:1px solid var(--line);padding-top:14px;padding-bottom:14px;font-size:12px;color:var(--ink-3)}
.v2-ft-legal a{color:var(--ink-3);text-decoration:none}
.v2-ft-legal a:hover{color:var(--ink);text-decoration:underline}
.v2-ft-links{display:flex;gap:8px;flex-wrap:wrap}
@media(max-width:1000px){
  .v2-footer-in{grid-template-columns:1fr 1fr;gap:36px}
  .v2-ft-brand{grid-column:1/-1;max-width:none}
}
@media(max-width:600px){
  .v2-footer-in{grid-template-columns:1fr;padding:40px 20px 28px;gap:28px}
  .v2-ft-bot-in{gap:12px}
  .v2-ft-legal{flex-direction:column;align-items:flex-start}
}

/* =========== COMPLAINTS — REDESIGN (cx-*) =========== */
.cx-overlay{position:fixed;inset:0;background:var(--bg);z-index:190;display:flex;flex-direction:column}
.cx-top{display:flex;align-items:center;gap:16px;padding:0 20px;height:56px;border-bottom:1px solid var(--line);background:var(--surface);flex-shrink:0}
.cx-back{width:32px;height:32px;border-radius:var(--radius-sm);display:grid;place-items:center;color:var(--ink-2);background:transparent}
.cx-back:hover{background:var(--surface-2);color:var(--ink)}
.cx-top-crumbs{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink)}
.cx-crumb-home{color:var(--ink-3)}
.cx-crumb-sep{color:var(--ink-3)}
.cx-top-stats{margin-left:auto;display:flex;align-items:center;gap:14px;font-size:12px;color:var(--ink-2)}
.cx-stat b{color:var(--ink);font-weight:600;font-family:var(--font-mono);margin-right:4px}
.cx-stat-sep{width:1px;height:14px;background:var(--line)}
.cx-help{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--line);background:var(--surface);color:var(--ink-2);font-size:12px}
.cx-help:hover{background:var(--surface-2);color:var(--ink)}
.cx-new{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--radius-sm);background:var(--accent);color:var(--accent-ink);font-size:13px;font-weight:500}
.cx-new:hover{filter:brightness(.95)}

.cx{flex:1;display:grid;grid-template-columns:300px 1fr 320px;overflow:hidden;min-height:0}

/* LIST */
.cx-list{border-right:1px solid var(--line);background:var(--surface);display:flex;flex-direction:column;min-height:0;overflow:hidden}
.cx-search{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--line)}
.cx-search svg{color:var(--ink-3);flex-shrink:0}
.cx-search input{flex:1;border:0;background:transparent;font-size:13px;color:var(--ink);outline:none;font-family:inherit}
.cx-filters{display:flex;gap:4px;padding:10px 10px;border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none}
.cx-filters::-webkit-scrollbar{display:none}
.cx-filter{padding:5px 10px;border-radius:999px;background:transparent;border:1px solid var(--line);font-size:11.5px;color:var(--ink-2);white-space:nowrap;display:flex;gap:5px;align-items:center;flex-shrink:0}
.cx-filter span{padding:1px 6px;border-radius:999px;background:var(--surface-2);font-size:10px;color:var(--ink-3);font-family:var(--font-mono)}
.cx-filter.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.cx-filter.on span{background:rgba(255,255,255,.15);color:var(--bg)}
.cx-items{flex:1;overflow-y:auto;padding:8px}
.cx-empty{padding:40px 20px;text-align:center;color:var(--ink-3);font-size:13px}
.cx-item{display:block;width:100%;text-align:left;padding:12px;border-radius:var(--radius-sm);background:transparent;border:1px solid transparent;margin-bottom:4px}
.cx-item:hover{background:var(--surface-2)}
.cx-item.on{background:var(--bg);border-color:var(--ink)}
[data-theme="dark"] .cx-item.on{background:var(--surface-2);border-color:var(--ink-3)}
.cx-item-row1{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.cx-item-id{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-3);font-weight:500}
.cx-item-dot{width:6px;height:6px;border-radius:999px;flex-shrink:0}
.cx-item-status{font-size:10.5px;color:var(--ink-2);font-weight:500}
.cx-item-prio{padding:0 5px;border-radius:3px;background:#fee2e2;color:#b91c1c;font-size:10px;font-weight:700}
[data-theme="dark"] .cx-item-prio{background:rgba(239,68,68,.18);color:#fca5a5}
.cx-item-unread{margin-left:auto;width:7px;height:7px;border-radius:999px;background:var(--accent)}
.cx-item-subj{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:3px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cx-item-last{font-size:11.5px;color:var(--ink-2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px}
.cx-item-foot{display:flex;justify-content:space-between;align-items:center;font-size:10.5px;color:var(--ink-3)}
.cx-item-sla{font-family:var(--font-mono);font-weight:600;color:var(--ink-2)}
.cx-item-sla.urgent{color:#dc2626}
[data-theme="dark"] .cx-item-sla.urgent{color:#fca5a5}

/* MAIN */
.cx-main{overflow-y:auto;background:var(--bg);position:relative}
.cx-detail{max-width:720px;margin:0 auto;padding:28px 32px 100px}

.cx-hero{margin-bottom:28px}
.cx-hero-head{display:flex;gap:20px;align-items:flex-start;margin-bottom:20px}
.cx-hero-head > div:first-child{flex:1;min-width:0}
.cx-hero-meta{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--ink-3);margin-bottom:8px;flex-wrap:wrap}
.cx-hero-id{font-family:var(--font-mono);font-weight:600;color:var(--ink-2);background:var(--surface-2);padding:2px 8px;border-radius:3px}
.cx-hero-cat{color:var(--ink-2);font-weight:500}
.cx-hero-dot{width:3px;height:3px;border-radius:999px;background:var(--ink-3)}
.cx-hero-title{font-family:var(--font-display);font-size:28px;font-weight:700;line-height:1.2;letter-spacing:-.02em;color:var(--ink);margin:0;text-wrap:balance}
.cx-hero-status{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--line);flex-shrink:0}
.cx-hero-ic{width:28px;height:28px;border-radius:999px;background:var(--sc,#3b82f6);color:#fff;display:grid;place-items:center;font-size:14px;font-weight:700}
.cx-hero-status small{display:block;font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em;line-height:1}
.cx-hero-status b{display:block;font-size:13px;color:var(--ink);font-weight:600;margin-top:2px;line-height:1.2}

/* Progress */
.cx-progress{display:flex;align-items:center;padding:16px 20px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:12px}
.cx-prog-step{display:flex;align-items:center;gap:8px;flex:1;position:relative}
.cx-prog-step:last-child{flex:0 0 auto}
.cx-prog-dot{width:24px;height:24px;border-radius:999px;background:var(--surface-2);color:var(--ink-3);display:grid;place-items:center;font-size:11px;font-weight:600;flex-shrink:0;border:1px solid var(--line);font-family:var(--font-mono)}
.cx-prog-step.done .cx-prog-dot{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.cx-prog-step.active .cx-prog-dot{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);box-shadow:0 0 0 4px rgba(220,38,38,.12)}
.cx-prog-label{font-size:12px;color:var(--ink-3);white-space:nowrap;font-weight:500}
.cx-prog-step.done .cx-prog-label,.cx-prog-step.active .cx-prog-label{color:var(--ink)}
.cx-prog-line{flex:1;height:1px;background:var(--line);margin:0 10px;min-width:20px}
.cx-prog-step.done .cx-prog-line{background:var(--ink)}

/* SLA */
.cx-sla{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--radius);background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.25);color:#1e40af;font-size:13px}
.cx-sla.urgent{background:rgba(220,38,38,.08);border-color:rgba(220,38,38,.3);color:#991b1b}
[data-theme="dark"] .cx-sla{background:rgba(59,130,246,.12);color:#93c5fd;border-color:rgba(59,130,246,.3)}
[data-theme="dark"] .cx-sla.urgent{background:rgba(220,38,38,.12);color:#fca5a5;border-color:rgba(220,38,38,.35)}
.cx-sla b{font-family:var(--font-mono);font-weight:700}
.cx-sla em{font-style:normal;opacity:.7;font-size:12px;margin-left:4px}

.cx-verdict{padding:14px 18px;border-radius:var(--radius);background:var(--surface-2);border-left:3px solid var(--accent);font-size:14px;color:var(--ink)}
.cx-verdict b{font-family:var(--font-mono);text-transform:uppercase;font-size:11px;letter-spacing:.05em;color:var(--ink-3);display:block;margin-bottom:4px;font-weight:600}

/* Sections */
.cx-sec{margin-bottom:28px}
.cx-sec-h{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);margin:0 0 12px;font-weight:600;display:flex;align-items:center;gap:8px}
.cx-sec-h-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cx-sec-h-row .cx-sec-h{margin:0}
.cx-sec-n{padding:1px 7px;border-radius:999px;background:var(--surface-2);font-size:10px;color:var(--ink-2);font-weight:700}

/* Order card */
.cx-order{display:flex;align-items:center;gap:14px;padding:14px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface)}
.cx-order img{width:56px;height:56px;object-fit:cover;border-radius:var(--radius-sm)}
.cx-order-info{flex:1;min-width:0}
.cx-order-t{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:4px;line-height:1.3}
.cx-order-s{font-size:12px;color:var(--ink-2);line-height:1.4}
.cx-order-s b{color:var(--ink);font-weight:500}
.cx-order-amt{text-align:right;padding-right:4px}
.cx-order-amt small{display:block;font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.cx-order-amt b{font-family:var(--font-display);font-size:18px;font-weight:700;color:var(--ink)}
.cx-btn-out{padding:7px 12px;border-radius:var(--radius-sm);background:transparent;border:1px solid var(--line);color:var(--ink-2);font-size:12px;font-weight:500}
.cx-btn-out:hover{background:var(--surface-2);color:var(--ink);border-color:var(--ink-3)}
.cx-btn-out.sm{padding:4px 10px;font-size:11px}
.cx-btn-out.full{width:100%;justify-content:center}

/* Reason */
.cx-reason{padding:16px 18px;border-radius:var(--radius);background:var(--surface-2);font-size:14px;color:var(--ink);line-height:1.65;white-space:pre-wrap;border-left:3px solid var(--ink-3)}

/* Gallery */
.cx-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.cx-gal-item{display:block;width:100%;text-align:left;background:transparent;padding:0;cursor:pointer}
.cx-gal-img{position:relative;width:100%;aspect-ratio:1;overflow:hidden;border-radius:var(--radius-sm);border:1px solid var(--line)}
.cx-gal-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s ease}
.cx-gal-item:hover .cx-gal-img img{transform:scale(1.05)}
.cx-gal-cap{font-size:12px;color:var(--ink);margin-top:7px;font-weight:500;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cx-gal-by{font-size:10.5px;color:var(--ink-3);margin-top:3px;font-family:var(--font-mono)}

/* Thread */
.cx-thread{display:flex;flex-direction:column;gap:16px;padding-left:6px;border-left:2px solid var(--line);padding-top:4px;padding-bottom:4px;margin-left:10px}
.cx-msg{display:flex;gap:10px;margin-left:-17px;padding-left:4px;background:var(--bg)}
.cx-msg-ava{width:28px;height:28px;border-radius:999px;background:var(--surface-2);color:var(--ink);display:grid;place-items:center;font-size:12px;font-weight:600;flex-shrink:0;border:2px solid var(--bg)}
.cx-msg-admin .cx-msg-ava{background:var(--ink);color:var(--bg)}
.cx-msg-me .cx-msg-ava{background:var(--accent);color:var(--accent-ink)}
.cx-msg-body{flex:1;min-width:0}
.cx-msg-who{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.cx-msg-who span{color:var(--ink-3);font-weight:400;font-size:11px}
.cx-msg-bubble{padding:10px 14px;border-radius:12px 12px 12px 4px;background:var(--surface);border:1px solid var(--line);font-size:13.5px;color:var(--ink);line-height:1.55;display:inline-block;max-width:100%}
.cx-msg-me .cx-msg-bubble{background:rgba(220,38,38,.06);border-color:rgba(220,38,38,.2)}
.cx-msg-admin .cx-msg-bubble{background:var(--surface-2)}
[data-theme="dark"] .cx-msg-me .cx-msg-bubble{background:rgba(220,38,38,.12)}

.cx-event{display:flex;gap:10px;align-items:center;margin-left:-11px;padding:4px 0;color:var(--ink-2);font-size:12.5px}
.cx-event-dot{width:8px;height:8px;border-radius:999px;background:var(--ink-3);flex-shrink:0;border:2px solid var(--bg)}
.cx-event-admin .cx-event-dot{background:var(--ink)}
.cx-event-user .cx-event-dot{background:var(--accent)}
.cx-event-seller .cx-event-dot{background:#f59e0b}
.cx-event-body{flex:1;display:flex;justify-content:space-between;align-items:center;gap:10px}
.cx-event-body b{color:var(--ink);font-weight:500;margin-right:5px}
.cx-event-at{font-size:11px;color:var(--ink-3);font-family:var(--font-mono);white-space:nowrap}

/* Compose bar */
.cx-compose-bar{position:absolute;bottom:0;left:0;right:0;display:flex;gap:8px;align-items:center;padding:14px 32px;background:var(--bg);border-top:1px solid var(--line);box-shadow:0 -4px 16px rgba(0,0,0,.04)}
.cx-c-attach{width:36px;height:36px;border-radius:var(--radius-sm);background:transparent;color:var(--ink-2);display:grid;place-items:center}
.cx-c-attach:hover{background:var(--surface-2);color:var(--ink)}
.cx-c-input{flex:1;padding:10px 14px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);font-size:13.5px;color:var(--ink);outline:none;font-family:inherit}
.cx-c-input:focus{border-color:var(--ink)}
.cx-c-send{display:flex;align-items:center;gap:5px;padding:10px 18px;border-radius:var(--radius-sm);background:var(--accent);color:var(--accent-ink);font-size:13px;font-weight:500}
.cx-c-send:disabled{opacity:.4;cursor:not-allowed}

/* SIDEBAR */
.cx-side{border-left:1px solid var(--line);background:var(--surface);overflow-y:auto;padding:20px 18px}
.cx-sb{display:flex;flex-direction:column;gap:14px}
.cx-sb-card{padding:14px;border:1px solid var(--line);border-radius:var(--radius);background:var(--bg)}
.cx-sb-label{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);margin-bottom:10px;font-weight:600}
.cx-handler,.cx-seller{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.cx-handler-ava{width:36px;height:36px;border-radius:999px;background:var(--ink);color:var(--bg);display:grid;place-items:center;font-size:14px;font-weight:700;flex-shrink:0}
.cx-seller-ava{width:36px;height:36px;border-radius:var(--radius-sm);background:var(--surface-2);color:var(--ink);display:grid;place-items:center;font-size:14px;font-weight:700;flex-shrink:0}
.cx-handler b,.cx-seller b{display:block;font-size:13px;color:var(--ink);font-weight:600;line-height:1.2}
.cx-handler small,.cx-seller small{display:block;font-size:11px;color:var(--ink-3);margin-top:3px}
.cx-seller-actions{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.cx-seller-actions .cx-btn-out{padding:6px 10px;font-size:11.5px;text-align:center;justify-content:center}
.cx-sb-empty{font-size:12px;color:var(--ink-3);padding:10px 0;font-style:italic}

.cx-actions{display:flex;flex-direction:column;gap:4px}
.cx-action{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);background:transparent;color:var(--ink);font-size:12.5px;text-align:left;border:0;cursor:pointer}
.cx-action:hover{background:var(--surface-2)}
.cx-action span{width:18px;display:inline-block;color:var(--ink-2)}
.cx-action.danger{color:#dc2626}
.cx-action.danger:hover{background:rgba(220,38,38,.08)}

.cx-related{display:flex;flex-direction:column;gap:8px}
.cx-rel{display:block;padding:10px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--surface);cursor:pointer;text-decoration:none}
.cx-rel:hover{border-color:var(--ink-3);background:var(--surface-2)}
.cx-rel-head{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.cx-rel-id{font-family:var(--font-mono);color:var(--ink-3);font-weight:500}
.cx-rel-status{font-weight:600}
.cx-rel-subj{font-size:12.5px;color:var(--ink);font-weight:500;line-height:1.3;margin-bottom:4px}
.cx-rel-verdict{font-size:11px;color:var(--ink-2)}

.cx-sb-help ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px}
.cx-sb-help li{font-size:12.5px;color:var(--ink-2);display:flex;gap:8px}
.cx-sb-help li a{color:var(--ink-2);text-decoration:underline;cursor:pointer}
.cx-sb-help li a:hover{color:var(--ink)}

@media(max-width:1200px){
  .cx{grid-template-columns:260px 1fr 280px}
  .cx-detail{padding:24px 24px 100px}
}
@media(max-width:1000px){
  .cx{grid-template-columns:260px 1fr}
  .cx-side{display:none}
}
@media(max-width:700px){
  .cx{grid-template-columns:1fr}
  .cx-list{display:none}
  .cx-detail{padding:16px 16px 90px}
  .cx-hero-title{font-size:22px}
}

/* ============================================================
   MOTION LAYER — micro-interactions across the app
   ============================================================ */

/* Respect reduced motion */
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{
    animation-duration:.001ms !important;
    transition-duration:.001ms !important;
  }
}

/* Global easing */
:root{
  --ease-out:cubic-bezier(.22,1,.36,1);
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
  --ease-smooth:cubic-bezier(.4,0,.2,1);
}

/* Global: smoother button press feedback */
button{transition:transform .12s var(--ease-out), background-color .15s, border-color .15s, color .15s, box-shadow .15s}
button:active:not(:disabled){transform:scale(.97)}

/* Hover lift for cards */
.card-lift{transition:transform .2s var(--ease-out), box-shadow .2s var(--ease-out), border-color .2s}
.card-lift:hover{transform:translateY(-2px);box-shadow:0 8px 24px -8px rgba(15,23,42,.12);border-color:var(--line-2)}

/* Product card hover (feed items) */
.v2-feed-item, .v2-fc-card, .pf-card{transition:transform .2s var(--ease-out), box-shadow .2s var(--ease-out), border-color .2s}
.v2-feed-item:hover, .v2-fc-card:hover, .pf-card:hover{transform:translateY(-2px);box-shadow:0 10px 24px -10px rgba(15,23,42,.12)}

.v2-feed-item img, .v2-fc-card img, .pf-card img{transition:transform .45s var(--ease-out)}
.v2-feed-item:hover img, .v2-fc-card:hover img, .pf-card:hover img{transform:scale(1.04)}

/* Image zoom needs overflow clip */
.v2-feed-item, .v2-fc-card, .pf-card{overflow:hidden}

/* Row hover slide highlight */
.ad-tbl tbody tr{position:relative}
.ad-tbl tbody tr::before{content:'';position:absolute;left:0;top:0;bottom:0;width:0;background:var(--accent);transition:width .18s var(--ease-out);pointer-events:none}
.ad-tbl tbody tr:hover::before{width:3px}
.ad-tbl tbody tr.sel::before{width:3px}

/* Queue item slide highlight */
.ad-q-item{transition:background-color .15s, padding-left .15s var(--ease-out)}
.ad-q-item:hover:not(.sel){padding-left:18px}

/* Nav item hover */
.ad-nav button{transition:background-color .15s, color .15s, padding-left .15s var(--ease-out)}
.ad-nav button:hover:not(.on){padding-left:14px}

/* Chip live pulse — already exists, add ring */
.ad-chip.live{position:relative}
.ad-chip.live .dot{position:relative}
.ad-chip.live .dot::after{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  border:1.5px solid currentColor;color:var(--pos);opacity:0;
  animation:liveRing 1.8s ease-out infinite;
}
@keyframes liveRing{
  0%{transform:scale(.6);opacity:.8}
  100%{transform:scale(2.4);opacity:0}
}

/* Ripple effect (attach .has-ripple to button) */
.has-ripple{position:relative;overflow:hidden;isolation:isolate}
.ripple{position:absolute;border-radius:50%;pointer-events:none;background:currentColor;opacity:.18;transform:scale(0);animation:rippleOut .55s var(--ease-out) forwards}
@keyframes rippleOut{to{transform:scale(2.5);opacity:0}}

/* Toast stack */
.toast-stack{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{
  pointer-events:auto;
  min-width:260px;max-width:380px;
  background:var(--surface);border:1px solid var(--line);border-radius:10px;
  padding:12px 14px;display:flex;gap:10px;align-items:flex-start;
  box-shadow:0 10px 30px -8px rgba(15,23,42,.18), 0 2px 6px rgba(15,23,42,.06);
  animation:toastIn .35s var(--ease-spring);
  font-size:13px;color:var(--ink);
}
.toast.leave{animation:toastOut .25s var(--ease-smooth) forwards}
.toast-ic{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;flex-shrink:0;color:#fff;margin-top:1px}
.toast-ic.pos{background:var(--pos)}
.toast-ic.warn{background:var(--warn)}
.toast-ic.neg{background:var(--neg)}
.toast-ic.info{background:var(--accent)}
.toast-main{flex:1;min-width:0}
.toast-title{font-weight:600;line-height:1.35}
.toast-desc{color:var(--ink-2);font-size:12px;margin-top:2px;line-height:1.4}
.toast-close{background:transparent;border:none;color:var(--ink-3);cursor:pointer;padding:0;font-size:14px;line-height:1;flex-shrink:0}
.toast-close:hover{color:var(--ink)}
.toast-bar{position:absolute;left:0;right:0;bottom:0;height:2px;background:var(--accent);transform-origin:left;animation:toastBar 4s linear forwards;border-radius:0 0 10px 10px}
.toast.pos .toast-bar{background:var(--pos)}
.toast.warn .toast-bar{background:var(--warn)}
.toast.neg .toast-bar{background:var(--neg)}
.toast{position:relative;overflow:hidden}
@keyframes toastIn{from{opacity:0;transform:translateX(30px) scale(.95)}to{opacity:1;transform:translateX(0) scale(1)}}
@keyframes toastOut{to{opacity:0;transform:translateX(30px)}}
@keyframes toastBar{from{transform:scaleX(1)}to{transform:scaleX(0)}}

/* Count-up animation helper — fade value swap */
.countup{display:inline-block;transition:color .3s}
.countup.bump{animation:numberBump .5s var(--ease-spring)}
@keyframes numberBump{0%{transform:scale(1)}40%{transform:scale(1.15);color:var(--accent)}100%{transform:scale(1)}}

/* Skeleton shimmer (for .skeleton base elements) */
.sk{background:linear-gradient(90deg,var(--surface-2) 0%, color-mix(in srgb,var(--line) 60%,var(--surface-2)) 40%, var(--surface-2) 80%);background-size:200% 100%;animation:skShimmer 1.6s linear infinite;border-radius:6px}
@keyframes skShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Scroll reveal */
.reveal{opacity:0;transform:translateY(14px);transition:opacity .5s var(--ease-out), transform .5s var(--ease-out)}
.reveal.in{opacity:1;transform:translateY(0)}

/* Tab indicator smooth */
.v2-tabs, .v2-cat-tabs{position:relative}

/* Price change glow */
@keyframes priceGlow{0%{background:color-mix(in srgb,var(--accent) 20%,transparent)}100%{background:transparent}}
.price-glow{animation:priceGlow 1.2s ease-out}

/* Badge ping (notification dot) */
.ping{position:relative}
.ping::after{
  content:'';position:absolute;inset:-2px;border-radius:inherit;
  box-shadow:0 0 0 0 currentColor;
  animation:pingOut 2s var(--ease-out) infinite;pointer-events:none;
}
@keyframes pingOut{
  0%{box-shadow:0 0 0 0 currentColor;opacity:.6}
  70%,100%{box-shadow:0 0 0 10px currentColor;opacity:0}
}

/* Heart/like button pop */
.pop-heart{transition:transform .15s}
.pop-heart:active{transform:scale(1.25)}
.pop-heart.popping{animation:heartPop .5s var(--ease-spring)}
@keyframes heartPop{
  0%{transform:scale(1)}
  30%{transform:scale(1.35)}
  60%{transform:scale(.9)}
  100%{transform:scale(1)}
}

/* Number badge scale on change */
.badge-bump{animation:badgeBump .35s var(--ease-spring)}
@keyframes badgeBump{
  0%{transform:scale(1)}
  50%{transform:scale(1.3)}
  100%{transform:scale(1)}
}

/* Status tag subtle pulse for pending/investigating */
.ad-status-tag.pending, .ad-status-tag.investigating, .ad-status-tag.new{
  position:relative;
}
.ad-status-tag.pending::before, .ad-status-tag.investigating::before, .ad-status-tag.new::before{
  content:'';width:5px;height:5px;border-radius:50%;background:currentColor;
  display:inline-block;margin-right:5px;vertical-align:middle;
  animation:pulse 1.8s ease-in-out infinite;
}

/* Focus ring — better accessibility + visual feedback */
button:focus-visible, input:focus-visible, textarea:focus-visible, .ad-cmdk:focus-visible{
  outline:2px solid var(--accent);outline-offset:2px;border-radius:var(--radius-sm);
}

/* Sticky header shadow on scroll */
.ad-topbar{transition:box-shadow .2s}
.ad-topbar.scrolled{box-shadow:0 4px 12px -4px rgba(15,23,42,.08)}

/* Command palette item hover arrow slide */
.ad-cmdk-item .arr{transition:transform .15s var(--ease-out);display:inline-block}
.ad-cmdk-item:hover .arr, .ad-cmdk-item.on .arr{transform:translateX(3px)}

/* Bulk bar buttons */
.ad-bulk-bar button{transition:transform .12s, background-color .15s}
.ad-bulk-bar button:active{transform:scale(.95)}

/* Queue unread dot soft pulse */
.ad-q-unread{animation:unreadPulse 2s ease-in-out infinite}
@keyframes unreadPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(11,95,255,.5)}
  50%{box-shadow:0 0 0 5px rgba(11,95,255,0)}
}

/* Decision cards — tap and selected states */
.ad-dp-dec{transition:transform .15s, border-color .15s, background-color .15s, box-shadow .15s}
.ad-dp-dec:hover{transform:translateY(-1px)}
.ad-dp-dec.on{box-shadow:0 4px 14px -4px color-mix(in srgb,var(--accent) 35%,transparent)}
.ad-dp-dec.on.warn{box-shadow:0 4px 14px -4px color-mix(in srgb,var(--warn) 40%,transparent)}
.ad-dp-dec.on.neg{box-shadow:0 4px 14px -4px color-mix(in srgb,var(--neg) 40%,transparent)}

/* Refund % buttons */
.ad-dp-refund-opts button{transition:transform .12s, background-color .15s, border-color .15s, color .15s}
.ad-dp-refund-opts button:hover:not(.on){transform:translateY(-1px);border-color:var(--line-2)}

/* Chat bubble entrance */
.msg-b{animation:bubbleIn .3s var(--ease-out)}
@keyframes bubbleIn{from{opacity:0;transform:translateY(6px) scale(.98)}to{opacity:1;transform:none}}

/* Checkbox tick draw */
.ad-cb{transition:background-color .15s, border-color .15s, transform .12s}
.ad-cb:active{transform:scale(.9)}
.ad-cb.on::after{animation:tickDraw .25s var(--ease-out)}
@keyframes tickDraw{from{width:0;opacity:0}to{width:8px;opacity:1}}

/* Icon button hover bg bloom */
.ad-icon-btn{transition:background-color .15s, border-color .15s, color .15s, transform .12s}
.ad-icon-btn:hover{background:var(--surface-2)}
.ad-icon-btn:active{transform:scale(.92)}

/* Bell dot subtle ping */
.ad-bell-dot{animation:unreadPulse 2.2s ease-in-out infinite}

/* Nav badge bump on mount (one-shot, use .badge-bump class) */

/* Metric chip number interpolation */
.ad-chip b{transition:color .2s}

/* Queue item selected dot glow */
.ad-q-item.sel .ad-q-prio-dot{box-shadow:0 0 0 3px color-mix(in srgb,currentColor 20%,transparent)}

/* Sidebar .on bar grow */
.ad-nav button.on::before{animation:navBar .28s var(--ease-out)}
@keyframes navBar{from{height:0}to{height:16px}}

/* Tab switch fade */
.ad-content, .ad-queue{animation:viewFade .25s var(--ease-out)}
@keyframes viewFade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* Floating compose indicator while typing */
.v2-fab, .v2-input{transition:box-shadow .2s}

/* Hint underline on link-style buttons */
.btn-ghost{position:relative}

/* Segment tab active indicator (for .ad-flt-grp) */
.ad-flt-grp button.on{transition:background .25s var(--ease-out), color .2s, box-shadow .2s}
