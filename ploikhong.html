<script>
// ============== GLOBAL MICRO-INTERACTION LAYER ==============
(function(){
  // ---------- Toast API ----------
  let toastStack = null;
  function ensureStack(){
    if(!toastStack){
      toastStack = document.createElement('div');
      toastStack.className = 'toast-stack';
      document.body.appendChild(toastStack);
    }
    return toastStack;
  }
  window.toast = function(opts){
    if(typeof opts === 'string') opts = {title: opts};
    const { title, desc, kind='info', duration=4000 } = opts;
    const stack = ensureStack();
    const el = document.createElement('div');
    el.className = 'toast ' + kind;
    const icons = {
      pos:'<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>',
      warn:'<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
      neg:'<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
      info:'<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
    };
    el.innerHTML = `
      <div class="toast-ic ${kind}">${icons[kind]||icons.info}</div>
      <div class="toast-main">
        <div class="toast-title">${title||''}</div>
        ${desc?`<div class="toast-desc">${desc}</div>`:''}
      </div>
      <button class="toast-close" aria-label="close">✕</button>
      <div class="toast-bar" style="animation-duration:${duration}ms"></div>
    `;
    stack.appendChild(el);
    const kill = ()=>{
      if(el._dead) return;
      el._dead = true;
      el.classList.add('leave');
      setTimeout(()=>el.remove(), 260);
    };
    el.querySelector('.toast-close').onclick = kill;
    setTimeout(kill, duration);
    return kill;
  };

  // ---------- Ripple on any button with .has-ripple (auto-apply to .ad-dp-actions button, .btn-grad, .ad-nav button, .ad-q-dhead-acts button) ----------
  document.addEventListener('click', function(e){
    const btn = e.target.closest('button');
    if(!btn) return;
    // skip inputs inside toolbar icons or tiny close buttons
    if(btn.closest('.toast')) return;
    if(btn.classList.contains('no-ripple')) return;
    // only ripple on primary / nav / action buttons
    const shouldRipple = btn.matches('.btn-grad, .ad-dp-actions button, .ad-bulk-bar button, .ad-nav button, .ad-queue-tabs button.on, .v2-fab, .v2-btn-primary, .co-pay-btn, .pdp-buy-btn');
    if(!shouldRipple) return;
    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    const x = e.clientX - rect.left - size/2;
    const y = e.clientY - rect.top - size/2;
    const r = document.createElement('span');
    r.className = 'ripple';
    r.style.width = r.style.height = size + 'px';
    r.style.left = x + 'px';
    r.style.top = y + 'px';
    if(getComputedStyle(btn).position === 'static') btn.style.position = 'relative';
    if(getComputedStyle(btn).overflow !== 'hidden') btn.style.overflow = 'hidden';
    btn.appendChild(r);
    setTimeout(()=>r.remove(), 600);
  }, true);

  // ---------- Scroll reveal (IntersectionObserver) ----------
  if('IntersectionObserver' in window){
    const io = new IntersectionObserver((entries)=>{
      entries.forEach(en=>{
        if(en.isIntersecting){
          en.target.classList.add('in');
          io.unobserve(en.target);
        }
      });
    }, {threshold:0.1, rootMargin:'0px 0px -40px 0px'});
    // Observe new .reveal nodes
    const mo = new MutationObserver(muts=>{
      muts.forEach(m=>{
        m.addedNodes.forEach(n=>{
          if(n.nodeType !== 1) return;
          if(n.matches?.('.reveal')) io.observe(n);
          n.querySelectorAll?.('.reveal').forEach(el=>io.observe(el));
        });
      });
    });
    mo.observe(document.body, {childList:true, subtree:true});
    document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
  }

  // ---------- Heart/like button auto-pop ----------
  document.addEventListener('click', function(e){
    const h = e.target.closest('.pop-heart, [data-like]');
    if(!h) return;
    h.classList.remove('popping');
    void h.offsetWidth;
    h.classList.add('popping');
    setTimeout(()=>h.classList.remove('popping'), 500);
  });

  // ---------- Topbar scroll shadow ----------
  const attachScrollShadow = ()=>{
    document.querySelectorAll('.ad-content, .ad-queue-scroll, .ad-q-detail').forEach(sc=>{
      if(sc._bound) return;
      sc._bound = true;
      sc.addEventListener('scroll', ()=>{
        const bar = document.querySelector('.ad-topbar');
        if(!bar) return;
        bar.classList.toggle('scrolled', sc.scrollTop > 4);
      });
    });
  };
  new MutationObserver(attachScrollShadow).observe(document.body, {childList:true, subtree:true});

  // ---------- Count-up on number change ----------
  // Utility to animate: window.bumpNumber(el)
  window.bumpNumber = function(el){
    if(!el) return;
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
  };

  // ---------- Occasional demo toast (showcase — fires once after 3s of admin open) ----------
  // Disabled to avoid noise; trigger only when user opens admin
  let adminToastShown = false;
  const adminObserver = new MutationObserver(()=>{
    const adOpen = document.querySelector('.ad');
    if(adOpen && !adminToastShown){
      adminToastShown = true;
      setTimeout(()=>{
        window.toast({title:'เคสใหม่เข้าแถว', desc:'R-0246 · รายงานประกาศของปลอม', kind:'warn', duration:4500});
      }, 2200);
    }
  });
  adminObserver.observe(document.body, {childList:true, subtree:true});
})();
</script>

<script>
(function(){
  // theme
  const theme=localStorage.getItem('ploi_theme')||'light';
  document.documentElement.setAttribute('data-theme',theme);
  document.getElementById('themeBtn').onclick=()=>{
    const cur=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
    document.documentElement.setAttribute('data-theme',cur);
    localStorage.setItem('ploi_theme',cur);
    // sync tweaks UI
    document.querySelectorAll('#themeRow button').forEach(b=>b.classList.toggle('on',b.dataset.t===cur));
  };
})();
</script>

<script>
// TWEAKS
const TWEAKS = /*EDITMODE-BEGIN*/{
  "accent": "#dc2626",
  "radius": 8,
  "radiusSm": 6,
  "density": 1,
  "font": "system",
  "theme": "light"
}/*EDITMODE-END*/;

(function(){
  const ACCENTS=[
    {n:'PloiKhong Red (spec)',c:'#dc2626',ink:'#fff'},
    {n:'Cobalt',c:'#0B5FFF',ink:'#fff'},
    {n:'Ink',c:'#111110',ink:'#fff'},
    {n:'Forest',c:'#166a3d',ink:'#fff'},
    {n:'Terracotta',c:'#c44b2c',ink:'#fff'},
    {n:'Plum',c:'#6b2d78',ink:'#fff'},
    {n:'Sand',c:'#d0b070',ink:'#111'},
    {n:'Crimson',c:'#d1213a',ink:'#fff'},
    {n:'Soul Red Crystal',c:'#a31621',ink:'#fff'},
    {n:'Brick Red',c:'#c1272d',ink:'#fff'},
    {n:'Chili',c:'#d6391f',ink:'#fff'},
    {n:'Coral Crimson',c:'#e63946',ink:'#fff'},
    {n:'Rust',c:'#b64926',ink:'#fff'},
    {n:'Ruby',c:'#9b1d20',ink:'#fff'},
    {n:'Vermilion',c:'#e34a27',ink:'#fff'},
    {n:'Scarlet',c:'#ff2d1f',ink:'#fff'},
  ];
  const root=document.documentElement;
  function apply(t){
    root.style.setProperty('--accent',t.accent);
    const a=ACCENTS.find(x=>x.c.toLowerCase()===t.accent.toLowerCase());
    root.style.setProperty('--accent-ink',a?a.ink:'#fff');
    root.style.setProperty('--radius',t.radius+'px');
    root.style.setProperty('--radius-sm',t.radiusSm+'px');
    root.style.setProperty('--density',t.density);
    const fontMap={
      system:"system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",
      plex:"'IBM Plex Sans Thai','IBM Plex Sans',system-ui,sans-serif",
      noto:"'Noto Sans Thai','Noto Sans',system-ui,sans-serif",
      line:"'LINE Seed Sans TH','IBM Plex Sans Thai',system-ui,sans-serif"
    };
    root.style.setProperty('--font-th',fontMap[t.font]||fontMap.plex);
    // load fonts on demand
    if(t.font==='noto' && !document.getElementById('f-noto')){
      const l=document.createElement('link');l.id='f-noto';l.rel='stylesheet';
      l.href='https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap';
      document.head.appendChild(l);
    }
    if(t.font==='line' && !document.getElementById('f-line')){
      const l=document.createElement('link');l.id='f-line';l.rel='stylesheet';
      l.href='https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap';
      document.head.appendChild(l);
    }
    root.setAttribute('data-theme',t.theme);
    localStorage.setItem('ploi_theme',t.theme);
  }
  function save(patch){
    Object.assign(TWEAKS,patch);
    apply(TWEAKS);
    try{window.parent.postMessage({type:'__edit_mode_set_keys',edits:patch},'*');}catch(e){}
  }
  // initial
  apply(Object.assign({},TWEAKS,{theme:localStorage.getItem('ploi_theme')||TWEAKS.theme}));

  // swatches
  const sw=document.getElementById('swatches');
  sw.innerHTML=ACCENTS.map(a=>`<div class="swatch ${a.c.toLowerCase()===TWEAKS.accent.toLowerCase()?'on':''}" style="background:${a.c}" data-c="${a.c}" title="${a.n}"></div>`).join('');
  sw.onclick=e=>{const s=e.target.closest('.swatch');if(!s)return;
    sw.querySelectorAll('.swatch').forEach(x=>x.classList.remove('on'));s.classList.add('on');
    save({accent:s.dataset.c});
  };
  document.getElementById('radiusRow').onclick=e=>{const b=e.target.closest('button');if(!b)return;
    document.querySelectorAll('#radiusRow button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
    save({radius:+b.dataset.r,radiusSm:+b.dataset.rs});
  };
  document.getElementById('densityRow').onclick=e=>{const b=e.target.closest('button');if(!b)return;
    document.querySelectorAll('#densityRow button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
    save({density:+b.dataset.d});
  };
  document.getElementById('fontRow').onclick=e=>{const b=e.target.closest('button');if(!b)return;
    document.querySelectorAll('#fontRow button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
    save({font:b.dataset.f});
  };
  document.getElementById('themeRow').onclick=e=>{const b=e.target.closest('button');if(!b)return;
    document.querySelectorAll('#themeRow button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
    save({theme:b.dataset.t});
  };

  // toggle visibility
  const panel=document.getElementById('tweaks');
  document.getElementById('tweakBtn').onclick=()=>panel.classList.toggle('on');
  document.getElementById('tweakClose').onclick=()=>panel.classList.remove('on');

  // Edit-mode host protocol
  window.addEventListener('message',ev=>{
    const d=ev.data||{};
    if(d.type==='__activate_edit_mode')panel.classList.add('on');
    else if(d.type==='__deactivate_edit_mode')panel.classList.remove('on');
  });
  try{window.parent.postMessage({type:'__edit_mode_available'},'*');}catch(e){}
})();
</script>
